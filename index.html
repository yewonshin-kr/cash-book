<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2e5443">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>가계부</title>
<style>
:root{
  --bg:#f5f6f5; --card:#ffffff; --ink:#22262a; --sub:#8b9198; --line:#eceeed;
  --accent:#4a7c64; --accent-deep:#2e5443; --accent-soft:#eef4f0;
  --green:#3e8e5f; --red:#d95757; --amber:#c98a2e; --amber-soft:#fbf5e9;
  --radius:8px; --shadow:0 1px 2px rgba(25,32,28,.05);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#e2e5e3;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;color:var(--ink)}
svg.i{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block}
/* Galaxy S26 Ultra (CSS 뷰포트 ≈ 412×915) 기준 최적화 */
#frame{max-width:412px;margin:0 auto;min-height:100dvh;background:var(--bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,.1);display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 1px 4px rgba(25,32,28,.05);padding:calc(14px + env(safe-area-inset-top)) 18px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
header h1{font-size:18px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
header .back{border:0;background:var(--bg);width:29px;height:29px;border-radius:7px;font-size:15px;color:var(--ink);cursor:pointer}
.gear{border:0;background:var(--bg);width:33px;height:33px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub)}
.month-row{display:flex;justify-content:center;align-items:center;gap:16px;padding:8px 0 12px;font-weight:800;font-size:14.5px}
.month-row button{border:0;background:var(--card);width:27px;height:27px;border-radius:7px;box-shadow:var(--shadow);font-size:13px;color:var(--sub);cursor:pointer}
.month-row .mlabel{cursor:pointer;padding:6px 8px;margin:-6px -8px;border-radius:7px}
/* 월 선택 시트: 연도 이동 + 12개월 그리드 */
.mpick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px}
.mpick button{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:13px 4px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit}
.mpick button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.mpick button.today{border-color:var(--accent);color:var(--accent-deep)}
.mpick button.dim{color:var(--sub);background:#fafbfa}
main{flex:1;padding:4px 14px 96px;overflow-x:hidden}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:10px}
/* 타이포 하이라키: 페이지 타이틀 18 > 섹션 14.5 > 카드(영역) 타이틀 13.5(잉크) > 행 13~13.5 > 보조 11.5~12.5(그레이) */
.card h3{font-size:13.5px;color:var(--ink);font-weight:800;letter-spacing:-.2px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.card h3 .sub{font-weight:500}
.card h3 .more{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}
.big-num{font-size:27px;font-weight:800;letter-spacing:-.5px}
.sub{color:var(--sub);font-size:12.5px}
.pos{color:var(--green)} .neg{color:var(--red)}
.bar{height:8px;background:#f0f2f1;border-radius:4px;overflow:hidden;margin:10px 0 6px}
.bar>i{display:block;height:100%;border-radius:4px;background:var(--accent);transition:width .5s}
.bar.warn>i{background:var(--amber)} .bar.over>i{background:var(--red)}
.minibar{height:4px;background:#f0f2f1;border-radius:2px;margin-top:4px;overflow:hidden}
.minibar>i{display:block;height:100%;border-radius:2px;background:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.grid2 .card{margin:0}
/* checklist */
.check{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.check:last-child{border-bottom:0}
.check .st{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:800}
.check.done .st{background:var(--accent-soft);color:var(--accent)}
.check.todo .st{background:#f0f2f1;color:#b8bdc2}
.check.warn .st{background:var(--amber-soft);color:var(--amber)}
.check .tx{flex:1;font-size:13.5px;font-weight:600}
.check.done .tx{color:var(--sub);text-decoration:line-through;text-decoration-color:#ccd1ce}
.check .hint{font-size:11.5px;color:var(--sub);font-weight:500}
.check .goarr{color:#c5cac7;font-size:14px}
/* chips */
.chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;vertical-align:1px}
.chip.wc{background:#f4efe4;color:#a07a2c} .chip.wp{background:var(--accent-soft);color:var(--accent)} .chip.ry{background:#e9edf4;color:#5b6b8c}
.filters{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;border:1px solid var(--line);background:var(--card);border-radius:7px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--sub);cursor:pointer}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.fchip.alert{border-color:var(--amber);color:var(--amber)}
.fchip.alert.on{background:var(--amber);color:#fff}
/* data table */
.tablewrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto;margin-bottom:10px}
table.data{border-collapse:collapse;width:100%;min-width:620px;font-size:12.5px}
table.data th{font-size:11px;color:var(--sub);font-weight:700;text-align:left;padding:10px;border-bottom:1.5px solid var(--line);white-space:nowrap;background:#fafbfa;cursor:pointer;user-select:none}
table.data th.num{text-align:right}
table.data td{padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:middle}
table.data tr:last-child td{border-bottom:0}
table.data td.num{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
table.data td.desc{max-width:170px;overflow:hidden;text-overflow:ellipsis;font-weight:600}
table.data tr.unclass{background:var(--amber-soft)}
table.data tr.dup td{opacity:.55}
select.catsel{border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:11.5px;background:#fff;font-family:inherit;max-width:120px;color:var(--ink)}
tr.unclass select.catsel{border-color:var(--amber);background:#fffdf6}
.tfoot{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;font-size:12.5px;color:var(--sub);font-weight:600;border-top:1.5px solid var(--line)}
/* 지출 내역 2줄 리스트 */
.txlist{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;padding:2px 14px 0;overflow:hidden}
.txrow{padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.txlist .txrow:nth-last-child(2){border-bottom:0}
.txrow.unclass{background:var(--amber-soft);margin:0 -14px;padding-left:14px;padding-right:14px}
.txrow .l1{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.txrow .l1 .d{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.txrow .l1 .a{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.txrow .l2{display:flex;align-items:center;gap:7px;margin-top:4px;min-width:0}
.txrow .l2 .dt{font-size:11.5px;color:var(--sub);flex-shrink:0}
.txrow .l2 .memo{font-size:11.5px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.catchip{font-size:10.5px;font-weight:700;background:var(--accent-soft);color:var(--accent);border-radius:5px;padding:2px 8px;flex-shrink:0;cursor:pointer}
/* 탭하면 편집되는 금액 (터치 영역 확장 포함) */
.amt-edit{cursor:pointer;text-decoration:underline dotted var(--accent);text-underline-offset:3px;padding:8px;margin:-8px;border-radius:6px}
.txlist .tfoot{margin:0 -14px}
.sortbar{display:flex;align-items:center;gap:2px;padding:0 4px 8px}
.sortbar span{font-size:11px;color:var(--sub);margin-right:4px}
.sortbar button{border:0;background:transparent;font-size:11.5px;font-weight:700;color:#b8bdc2;cursor:pointer;padding:3px 7px;border-radius:6px;font-family:inherit}
.sortbar button.on{color:var(--accent-deep);background:var(--accent-soft)}
/* 지출 필터 시트 카테고리 체크리스트 */
.fltlist{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.fltlist label{display:flex;align-items:center;gap:9px;padding:8px 2px;font-size:13.5px;font-weight:600;cursor:pointer}
.fltlist input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}
.toolbar{display:flex;gap:7px;margin-bottom:10px}
.toolbar button{border:1px solid var(--line);background:var(--card);border-radius:7px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.toolbar button svg.i{width:14px;height:14px}
.toolbar .primary{background:var(--accent);border-color:var(--accent);color:#fff}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;background:var(--amber);color:#fff;font-size:9.5px;font-weight:800;padding:0 4px}
/* segmented */
.seg{display:flex;background:#e9ebe9;border-radius:8px;padding:3px;margin:8px 0 12px} /* 타이틀바 아래 여백 = 홈(.sect)과 동일 */
.seg button{flex:1;border:0;background:transparent;padding:8px 4px;border-radius:6px;font-size:12.5px;font-weight:700;color:var(--sub);cursor:pointer;font-family:inherit}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
/* settle rows */
.setrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.setrow:last-child{border-bottom:0}
.setrow .lbl{color:var(--ink);font-weight:600}
.setrow .lbl small{display:block;color:var(--sub);font-weight:500;font-size:11.5px;margin-top:1px}
.setrow .val{font-weight:700}
.setrow.head{font-weight:800;font-size:14.5px}
.setrow.indent{padding-left:14px;font-size:13px}
.setrow.indent .lbl{color:var(--sub);font-weight:500}
.setrow.indent .val{font-weight:600}
.hl{background:var(--accent-soft);border-radius:7px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.hl b{font-size:14px} .hl .v{font-size:16px;font-weight:800;color:var(--accent-deep)}
/* chart */
.chart{display:flex;align-items:flex-end;gap:6px;height:105px;padding-top:8px}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.chart .col i{width:100%;max-width:26px;border-radius:3px 3px 1px 1px;background:var(--accent);display:block}
.chart .col span{font-size:10px;color:var(--sub);font-weight:600}
.chart .col .cv{font-size:9px;font-weight:700;color:var(--sub);letter-spacing:-.2px;white-space:nowrap}
.chart .col{cursor:pointer}
/* asset */
.acct{padding:12px 0;border-bottom:1px solid var(--line)}
.acct:last-child{border-bottom:0}
.acct .top{display:flex;justify-content:space-between;align-items:baseline}
.acct .top b{font-size:13.5px;font-weight:700}
.acct .top .rate{font-size:12.5px;font-weight:800}
.acct .btm{display:flex;justify-content:space-between;margin-top:3px;font-size:12px;color:var(--sub)}
.tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#f0f2f1;color:var(--sub);margin-left:6px;vertical-align:1px}
.tag.gg{background:var(--accent-soft);color:var(--accent)}
.tag.rr{background:#f6eded;color:#b06060}
.pre{color:var(--amber);font-weight:700;font-size:12px;background:var(--amber-soft);padding:2px 7px;border-radius:5px}
.workrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
.workrow:last-child{border-bottom:0}
.workrow .wi{flex:1;min-width:0}
.workrow .goarr{color:#c5cac7}
/* info rows */
.inforow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.inforow:last-child{border-bottom:0}
.inforow .k{color:var(--sub);font-weight:500}
.inforow .v{font-weight:700}
/* bottom nav */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:412px;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:9px 4px calc(9px + env(safe-area-inset-bottom));z-index:30}
nav button{position:relative;border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:700;color:#b3b8bc;cursor:pointer;width:60px}
nav button.on{color:var(--accent-deep)}
/* sheet */
.overlay{position:fixed;inset:0;background:rgba(20,26,22,.45);z-index:40;display:none}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translate(-50%,105%);width:100%;max-width:412px;background:var(--card);border-radius:14px 14px 0 0;z-index:50;padding:18px 18px calc(18px + env(safe-area-inset-bottom));transition:transform .28s cubic-bezier(.3,1,.4,1);max-height:92dvh;overflow-y:auto}
.sheet.show{transform:translate(-50%,0)}
.sheet .grab{width:36px;height:4px;border-radius:2px;background:#dde0de;margin:0 auto 14px}
.sheet h2{font-size:15.5px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.sheet h2 .close{border:0;background:#f0f2f1;width:27px;height:27px;border-radius:7px;font-size:12px;color:var(--sub);cursor:pointer}
.frow{display:flex;gap:9px;margin-bottom:9px}
.frow input,.frow select{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;font-size:13.5px;font-family:inherit;background:var(--card);min-width:0;color:var(--ink)}
.frow input:focus,.frow select:focus{outline:none;border-color:var(--accent)}
.flabel{font-size:11.5px;font-weight:700;color:var(--sub);margin:4px 2px 6px}
.save-btn{width:100%;border:0;background:var(--accent);color:#fff;font-size:14.5px;font-weight:800;padding:13px;border-radius:8px;cursor:pointer;font-family:inherit}
.save-btn:disabled{background:#c9cdc9}
.save-btn.ghost{background:transparent;color:var(--red);padding:9px}
.upload-zone{border:1.5px dashed #c8cec9;border-radius:8px;padding:24px 16px;text-align:center;color:var(--sub);font-size:12.5px;font-weight:600;margin-bottom:10px;cursor:pointer;background:#fafbfa}
.upload-zone b{display:block;font-size:14px;color:var(--ink);margin-bottom:4px}
textarea.paste{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12.5px;font-family:inherit;min-height:76px;resize:vertical;margin-bottom:10px}
/* batch rows */
.batchrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.batchrow:last-child{border-bottom:0}
.batchrow .bn{flex:1;font-size:13px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.batchrow .bp{font-size:10.5px;color:var(--sub);white-space:nowrap}
.batchrow input{width:96px;border:1.5px solid var(--line);border-radius:7px;padding:8px 9px;font-size:13px;text-align:right;font-family:inherit}
.batchrow input:focus{outline:none;border-color:var(--accent)}
.batchrow select.mini{border:1px solid var(--line);border-radius:6px;padding:6px 4px;font-size:11px;font-family:inherit;color:var(--sub);background:#fff}
.net{font-size:10.5px;color:var(--accent);font-weight:700;width:70px;text-align:right;white-space:nowrap}
.note{font-size:11.5px;color:var(--sub);text-align:center;padding:12px 20px;line-height:1.6}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:8px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat3 .card{margin:0;padding:12px}
.stat3 .card .sub{font-size:10.5px}
.stat3 .card b{font-size:14px;display:block;margin-top:3px;letter-spacing:-.3px}
.stat3 .card.em{background:var(--accent-soft)}
.stat3 .card.em .sub{color:var(--accent)}
.stat3 .card.em b{color:var(--accent-deep)}
.hero{background:var(--accent-deep);color:#fff}
.hero h3{color:#a8c4b5!important}
.hero h3.big{font-size:16px;color:#fff!important;margin-bottom:12px}
/* 홈 섹션 타이틀 */
.sect{display:flex;justify-content:space-between;align-items:baseline;font-size:14.5px;font-weight:800;letter-spacing:-.3px;margin:20px 6px 8px}
.sect .more{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}
.sect .sub{font-weight:500}
.hero .big-num{color:#fff}
.hero .sub{color:#a8c4b5}
/* 히어로 내부 3분할 통계 */
.hstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.hstats .hs span{display:block;color:#a8c4b5;font-size:10.5px;font-weight:700}
.hstats .hs b{display:block;color:#fff;font-size:14px;margin-top:4px;letter-spacing:-.3px}
/* 히어로 내부 요약 행 */
.hrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:13.5px}
.hrow:last-child{border-bottom:0}
.hrow span{color:#a8c4b5;font-weight:600}
.hrow b{color:#fff;font-weight:700}
.hrow b.up{color:#8fd4ac}
.hrow.dim span{color:#7d998b;font-weight:500}
.hrow.dim b{color:#9db8ab;font-weight:500}
.cico{width:26px;height:26px;border-radius:6px;background:var(--accent-soft);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0;vertical-align:middle}
.cico svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div id="frame">
  <header id="header"></header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ============ 아이콘 (원톤 SVG) ============ */
const IC={
 home:'<svg class="i" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>',
 list:'<svg class="i" viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg>',
 chart:'<svg class="i" viewBox="0 0 24 24"><path d="M4 20V10M11 20V4M18 20v-7"/><path d="M2 20h20"/></svg>',
 trend:'<svg class="i" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/></svg>',
 pen:'<svg class="i" viewBox="0 0 24 24"><path d="M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z"/></svg>',
 gear:'<svg class="i" viewBox="0 0 24 24"><path d="M4 8h10M18 8h2M4 16h2M10 16h10"/><circle cx="16" cy="8" r="2"/><circle cx="8" cy="16" r="2"/></svg>',
 up:'<svg class="i" viewBox="0 0 24 24"><path d="M12 17V5M6 11l6-6 6 6"/><path d="M4 21h16"/></svg>',
 plus:'<svg class="i" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>',
 dl:'<svg class="i" viewBox="0 0 24 24"><path d="M12 5v12M6 11l6 6 6-6"/><path d="M4 21h16"/></svg>',
};

function ensureMonths(){

/* 작품 상태: 판매종료(수동) > 출간전(출간일 미도래, 자동) > 판매중(자동) */
function workStatus(w){
  if(w.ended)return'판매종료';
  const d=(w.pubDate||'').slice(0,10);
  if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d>TODAY?'출간전':'판매중';
  return (w.hist&&w.hist.some(v=>v>0))?'판매중':'출간전'; /* 출간일 미등록 시 정산 이력으로 판단 */
}
const STATUS_ORDER={'판매중':0,'출간전':1,'판매종료':2};
/* 작품 공통 정렬: 판매중 → 출간전(등록순) → 판매종료, 같은 상태는 출간일 빠른 순 */
function workSort(a,b){
  const sa=STATUS_ORDER[workStatus(a)],sb=STATUS_ORDER[workStatus(b)];
  if(sa!==sb)return sa-sb;
  if(workStatus(a)==='출간전')return WORKS.indexOf(a)-WORKS.indexOf(b);
  return (a.pubDate||'').localeCompare(b.pubDate||'');
}
const workCum=w=>w.base+w.hist.reduce((s,v)=>s+v,0);
const advanceUsed=w=>w.hist.reduce((s,v)=>s+v,0);
const advanceLeft=w=>Math.max(0,w.advance-advanceUsed(w));
/* 해당 월 정산금·입금액 — 음수 인덱스(2026년 이전)는 이관된 과거 데이터(PAST_HIST)에서 읽기 */
const pastAt=(w,i)=>{const v=(PAST_HIST[workKey(w)]||{})[ymOf(i)];return v?{s:v[0],d:v.length>1?v[1]:v[0]}:{s:0,d:0};};
const workSettleAt=(w,i)=>i<0?pastAt(w,i).s:(w.hist[i]||0);
/* 실제 입금액: 선인세 작품은 선인세 소진 전까지 입금 0 */
function workDeposit(w,i){
  if(i<0)return pastAt(w,i).d;
  if(!w.advance)return w.hist[i]||0;
  const before=w.hist.slice(0,i).reduce((s,v)=>s+v,0);
  const after=before+(w.hist[i]||0);
  if(after<=w.advance)return 0;
  return after-Math.max(before,w.advance);
}
/* 선인세 수령 입금: 축(2026~) 월만 합산 — 과거 수령분은 이관 데이터(PAST_HIST 입금)에 이미 포함 */

const monthDeposit=i=>WORKS.reduce((s,w)=>s+workDeposit(w,i),0)+(i<0?0:(OTHER_ROYALTY[i]||0))+advPayAt(i);
const monthSettle=i=>WORKS.reduce((s,w)=>s+workSettleAt(w,i),0)+(i<0?0:(OTHER_ROYALTY[i]||0));

function workAvg(w){
  const entries=Object.entries(PAST_HIST[workKey(w)]||{}).map(([ym,v])=>[ym,v[0]]);

  const total=entries.filter(([ym])=>ym>=first&&ym<=last).reduce((s,[,v])=>s+v,0);
  return total/monthsBetween(first,last);
}

  /* 타이틀바: 타이틀 + 설정 버튼만 */
  const titles={home:'홈',list:'지출',settle:'결산',invest:investItem!==null?ISA_ITEMS[investItem].name:investAcc!==null?ACCOUNTS[investAcc].name:'투자',royalty:royaltyWork?royaltyWork:'인세',settings:'설정'};
  const back=(royaltyWork&&tab==='royalty')?`<button class="back" onclick="backWork()">‹</button>`:((investItem!==null||investAcc!==null)&&tab==='invest')?`<button class="back" onclick="backItem()">‹</button>`:'';
  const left=`<h1>${back}${titles[tab]}</h1>`;
  $('#header').innerHTML=`${left}<button class="gear" onclick="go('settings')">${IC.gear}</button>`;
}
function renderNav(){
  const uc=unclassCount();
  const items=[['home',IC.home,'홈'],['settle',IC.chart,'결산'],['list',IC.list,'지출',uc],['invest',IC.trend,'투자'],['royalty',IC.pen,'인세']];
  $('#nav').innerHTML=items.map(it=>`<button class="${tab===it[0]?'on':''}" onclick="go('${it[0]}')">${it[1]}${it[2]}${it[3]?`<span class="badge" style="position:absolute;top:-3px;right:12px">${it[3]}</span>`:''}</button>`).join('');
}
/* ===== 안드로이드/브라우저 뒤로가기 = 앱 내 뒤로가기 =====
   내비게이션마다 이전 상태를 스택에 push. 뒤로가기 순서: 열린 시트 닫기 → 상세 뒤로 → 이전 탭.
   스택이 비면 브라우저 기본 동작(앱 종료). */
let histStack=[], suppressPop=false, sheetInHist=false;
function pushHist(){
  histStack.push({tab,royaltyWork,investItem,investAcc});
  history.pushState({app:histStack.length},'');
}
window.addEventListener('popstate',()=>{
  if(suppressPop){suppressPop=false;return;}
  if($('#sheet').classList.contains('show')){ sheetInHist=false; closeSheet(true); return; }
  const s=histStack.pop();
  if(!s) return;
  tab=s.tab; royaltyWork=s.royaltyWork; investItem=s.investItem; investAcc=s.investAcc;
  render(); scrollTop();
});
function go(t){
  if(t===tab&&!royaltyWork&&investItem===null&&investAcc===null)return;
  pushHist();
  tab=t;if(t!=='royalty')royaltyWork=null;if(t!=='invest'){investItem=null;investAcc=null;}render();scrollTop();
}
function backWork(){history.back();}
function backItem(){history.back();}
function openInvestItem(i,ev){if(ev)ev.stopPropagation();pushHist();investItem=i;investAcc=null;render();scrollTop();}
function openAccountDetail(i){pushHist();investAcc=i;investItem=null;render();scrollTop();}
/* 좌우 스와이프 → 월 이동 (월 구분이 있는 탭) */
function swipeMonth(dir){
  const move=(cur,max)=>{const n=cur+dir;return(n<PAST_MIN||n>max)?null:n;};
  if(tab==='settle'&&settleSeg==='month'){const n=move(settleIdx,MLABELS.length-1+FUTURE_M);if(n===null){toast(dir>0?'다음 달 데이터 없음':'이전 데이터가 없어요');return;}settleIdx=n;render();}
  else if(tab==='royalty'&&!royaltyWork&&royaltySeg==='monthly'){const n=move(royaltyMonthIdx,MLABELS.length-1+FUTURE_M);if(n===null)return;royaltyMonthIdx=n;render();}
  else if(tab==='list'){const n=move(listMonthIdx,MLABELS.length-1+FUTURE_M);if(n===null){toast(dir>0?'다음 달 데이터 없음':'이전 데이터가 없어요');return;}listMonthIdx=n;render();}
  else if(tab==='invest'&&investSeg==='month'){const n=move(investMonthIdx,MLABELS.length-1+FUTURE_M);if(n===null){toast(dir>0?'다음 달 데이터 없음':'이전 데이터가 없어요');return;}investMonthIdx=n;render();}
}
function setSettle(i){settleIdx=i;render();}
/* 월 이동바 라벨 탭 → 월 선택 시트 (연도 이동 + 12개월 그리드) */
let mpickYear=null, mpickTarget=null;
function openMonthPicker(target){
  mpickTarget=target;
  const cur={list:listMonthIdx,settle:settleIdx,royalty:royaltyMonthIdx,invest:investMonthIdx}[target];
  mpickYear=+ymOf(cur).slice(0,4);
  renderMonthPicker();
  openSheetEl();
}
function mpickMoveYear(d){
  const minY=+ymOf(PAST_MIN).slice(0,4), maxY=+ymOf(MLABELS.length+FUTURE_M-1).slice(0,4);
  mpickYear=Math.min(maxY,Math.max(minY,mpickYear+d));
  renderMonthPicker();
}
function renderMonthPicker(){
  const cur={list:listMonthIdx,settle:settleIdx,royalty:royaltyMonthIdx,invest:investMonthIdx}[mpickTarget];
  const todayIdx=idxOfYm(TODAY.slice(0,7));
  $('#sheet').innerHTML=`
  <div class="grab"></div>
  <h2>월 선택<button class="close" onclick="closeSheet()">✕</button></h2>
  <div class="month-row" style="padding:0 0 14px">
    <button onclick="mpickMoveYear(-1)">‹</button><span>${mpickYear}년</span><button onclick="mpickMoveYear(1)">›</button>
  </div>
  <div class="mpick">${[...Array(12)].map((_,m)=>{
    const i=idxOfYm(mpickYear+'-'+String(m+1).padStart(2,'0'));
    const ok=i>=PAST_MIN&&i<MLABELS.length+FUTURE_M;
    return `<button class="${i===cur?'on':''} ${i===todayIdx&&i!==cur?'today':''} ${(i<0||i>=MLABELS.length)?'dim':''}" ${ok?`onclick="pickMonth('${mpickTarget}',${i})"`:'disabled style="opacity:.25"'}>${m+1}월</button>`;
  }).join('')}</div>
  <button class="save-btn ghost" style="color:var(--accent)" onclick="pickMonth('${mpickTarget}',${todayIdx})">이번 달로 이동</button>`;
}
function pickMonth(t,i){
  if(t==='list')listMonthIdx=i;
  else if(t==='settle')settleIdx=i;
  else if(t==='invest')investMonthIdx=i;
  else royaltyMonthIdx=i;
  closeSheet();render();scrollTop();
}
function swipeList(d){tab='list';swipeMonth(d);}
function swipeInvest(d){tab='invest';swipeMonth(d);}

/* ============ 홈 ============ */
function spentByCat(){const m={};TXNS.forEach(t=>{if(t.category)m[t.category]=(m[t.category]||0)+t.amount;});return m;}

/* 홈 체크리스트 (설정에서 추가/수정/삭제 가능) — done: 체크한 날짜(YYYY-MM-DD), 이번 달만 유효 */
let CHECKS=[
 {id:'invest', tx:'투자 입력', go:'invest', done:''},
 {id:'royalty', tx:'인세 정산 입력', go:'royalty', done:''},
];
function checkDoneNow(c){ return !!(c.done&&c.done.slice(0,7)===TODAY.slice(0,7)); }
function checkHint(c){ return checkDoneNow(c)?(+c.done.slice(5,7))+'/'+(+c.done.slice(8,10)):''; }
function toggleCheck(id,ev){
  ev.stopPropagation();
  const c=CHECKS.find(x=>x.id===id); if(!c)return;
  c.done=checkDoneNow(c)?'':TODAY;
  render();toast(c.done?'완료 체크':'체크 해제');
}

    </div>`).join('')}
  </div>

  <div class="card" style="padding:13px 16px">
    <h3 style="margin-bottom:4px">지난달 결산 요약 <span class="sub">${lk}</span></h3>
    <div class="setrow"><span class="lbl">수입</span><span class="val pos">+ ${fmt(incSum6)}원</span></div>
    <div class="setrow"><span class="lbl">저축·투자</span><span class="val">${fmt(sav6)}원</span></div>
    <div class="setrow"><span class="lbl">고정지출</span><span class="val">${fmt(fix6)}원</span></div>
    <div class="setrow"><span class="lbl">생활비</span><span class="val">${fmt(liveLiving(li))}원</span></div>
    <div class="setrow"><span class="lbl">인세 입금</span><span class="val pos">+ ${fmt(monthDeposit(li))}원</span></div>
  </div>

  <div class="sect">지출 <span class="more" onclick="go('list')">내역 ›</span></div>
  <div class="card">
    <h3>지난달 지출 합계 <span class="sub">${MLABELS[LAST]}</span></h3>

  ${(()=>{

    <div class="setrow"><span class="lbl">총 평가금</span><span class="val">${iv==null?'-':fmt(iv)+'원'} ${ir!=null?`<b class="${ir>=0?'pos':'neg'}" style="font-size:12px">${ir>=0?'+':''}${ir.toFixed(1)}%</b>`:''}</span></div>

    <div class="setrow"><span class="lbl">지난달 입금</span><span class="val pos">+ ${fmt(monthDeposit(MLABELS.length-2))}원</span></div>

    <div class="setrow"><span class="lbl">전체 누적</span><span class="val">${fmt(WORKS.reduce((s,w)=>s+workCum(w),0))}원</span></div>
    <div class="setrow"><span class="lbl">인세용 자유적금 잔고</span><span class="val">${fmt(rySavingBalance(li))}원</span></div>
  </div>`;
}

/* ============ 지출 ============ */
function viewList(){
  const mi=listMonthIdx;
  const monthTxns=TXNS.filter(t=>txnM(t)===mi);
  const uc=monthTxns.filter(t=>!t.category).length;
  const monthRow=`<div class="month-row"><button onclick="swipeMonth(-1)">‹</button><span class="mlabel" onclick="openMonthPicker('list')">${mFull(mi)} ▾</span><button onclick="swipeMonth(1)">›</button></div>`;
  if(monthTxns.length===0){
    return `${monthRow}
    <div class="card" style="text-align:center;padding:36px 16px">
      <b style="font-size:15px">${mKey(mi)} 상세 내역 없음</b>
    </div>`;
  }
  let list=monthTxns.filter(t=>{
    if(listFilter.cats.length){
      const s=t.category?catShort(t.category):'미분류';
      if(!listFilter.cats.includes(s))return false;
    }
    if(listFilter.min!=null&&t.amount<listFilter.min)return false;
    if(listFilter.max!=null&&t.amount>listFilter.max)return false;
    return true;
  });
  list=[...list].sort((a,b)=>{
    let r=0;
    if(sortKey==='date')r=a.date.localeCompare(b.date)||a.id-b.id;
    else if(sortKey==='amount')r=a.amount-b.amount;
    else if(sortKey==='category')r=(a.category||'ㅎ').localeCompare(b.category||'ㅎ');
    return r*sortDir;
  });
  const total=list.reduce((s,t)=>s+t.amount,0);
  const arrow=k=>sortKey===k?(sortDir===1?' ▲':' ▼'):'';
  return `
  ${monthRow}
  <div class="toolbar">
    <button class="primary" onclick="openImport()">${IC.up}카드 내역 가져오기</button>
    <button onclick="openManual()">${IC.plus}수동 입력</button>
    <button onclick="exportCsv()">${IC.dl}CSV</button>
  </div>
  <div class="filters">
    <button class="fchip ${filterActive()?'on':''}" onclick="openListFilter()"><svg class="i" style="width:12px;height:12px;display:inline-block;vertical-align:-1px;margin-right:4px" viewBox="0 0 24 24"><polygon points="3 4 21 4 14 12.5 14 19 10 21 10 12.5"/></svg>필터${filterActive()?` ${filterActive()}`:''}</button>
    ${uc?`<button class="fchip alert ${listFilter.cats.length===1&&listFilter.cats[0]==='미분류'?'on':''}" onclick="quickUnclass()">미분류 ${uc}</button>`:''}
    ${listFilter.cats.filter(c=>c!=='미분류'||!(listFilter.cats.length===1)).map(c=>`<button class="fchip on" onclick="removeListCat('${c}')">${c} ✕</button>`).join('')}
    ${(listFilter.min!=null||listFilter.max!=null)?`<button class="fchip on" onclick="listFilter.min=null;listFilter.max=null;render()">${listFilter.min!=null?fmt(listFilter.min):''}~${listFilter.max!=null?fmt(listFilter.max):''}원 ✕</button>`:''}
  </div>
  <div class="sortbar"><span>정렬</span>
    <button class="${sortKey==='date'?'on':''}" onclick="setSort('date')">날짜${arrow('date')}</button>
    <button class="${sortKey==='amount'?'on':''}" onclick="setSort('amount')">금액${arrow('amount')}</button>
  </div>
  <div class="txlist">
    ${list.map(t=>`<div class="txrow ${!t.category?'unclass':''}" onclick="openManual(${t.id})">
      <div class="l1"><span class="d">${t.desc}</span><span class="a ${t.amount<0?'pos':''}">${fmt(t.amount)}원</span></div>
      <div class="l2">
        <span class="dt">${t.date.slice(5).replace('-','.')}</span>
        ${catCell(t)}
        ${t.welfare==='복지_카드'?'<span class="chip wc">복지카드</span>':t.welfare==='복지_포인트'?'<span class="chip wp">복지포인트</span>':''}
        ${t.memo?`<span class="memo">${t.memo}</span>`:''}
      </div>
    </div>`).join('')}
    <div class="tfoot"><span>${list.length}건${uc&&!filterActive()?` · <b style="color:var(--amber)">미분류 ${uc}건</b>`:''}</span><b style="color:var(--ink);font-size:13.5px">합계 ${fmt(total)}원</b></div>
  </div>
`;
}
/* 분류 셀: 미분류(또는 수정 중)면 셀렉트, 분류 완료면 칩 */
let editCatId=null;
function catCell(t){
  if(!t.category||editCatId===t.id){
    return `<select class="catsel" onclick="event.stopPropagation()" onchange="setCat(${t.id},this.value)">
      <option value="">${!t.category?'⚠ 선택':'—'}</option>
      ${CATS.map(c=>`<option value="${c.name}" ${t.category===c.name?'selected':''}>${c.short}</option>`).join('')}
    </select>`;
  }
  return `<span class="catchip" onclick="event.stopPropagation();editCatId=${t.id};render()">${catShort(t.category)}</span>`;
}
/* 지출 필터: 카테고리 다중 선택 + 금액 범위 */
let listFilter={cats:[],min:null,max:null};
function filterActive(){return listFilter.cats.length+((listFilter.min!=null||listFilter.max!=null)?1:0);}
function quickUnclass(){
  listFilter.cats=(listFilter.cats.length===1&&listFilter.cats[0]==='미분류')?[]:['미분류'];
  render();
}
function removeListCat(c){listFilter.cats=listFilter.cats.filter(x=>x!==c);render();}
function toggleListCat(c){const a=listFilter.cats,i=a.indexOf(c);i>=0?a.splice(i,1):a.push(c);}
function openListFilter(){
  const opts=['미분류',...CATS.map(c=>c.short)];
  $('#sheet').innerHTML=`
  <div class="grab"></div>
  <h2>지출 필터<button class="close" onclick="closeSheet()">✕</button></h2>
  <div class="flabel">카테고리 (선택 없음 = 전체)</div>
  <div class="fltlist">
    ${opts.map(c=>`<label><input type="checkbox" ${listFilter.cats.includes(c)?'checked':''} onchange="toggleListCat('${c}')">${c}</label>`).join('')}
  </div>
  <div class="flabel" style="margin-top:12px">금액 범위 (원)</div>
  <div class="frow">
    <input type="number" id="lfMin" placeholder="최소" value="${listFilter.min??''}">
    <input type="number" id="lfMax" placeholder="최대" value="${listFilter.max??''}">
  </div>
  <button class="save-btn" onclick="applyListFilter()">적용</button>
  <button class="save-btn ghost" onclick="resetListFilter()">필터 초기화</button>`;
  openSheetEl();
}
function applyListFilter(){
  const mn=$('#lfMin').value, mx=$('#lfMax').value;
  listFilter.min=mn===''?null:+mn;
  listFilter.max=mx===''?null:+mx;
  closeSheet();render();
}
function resetListFilter(){listFilter={cats:[],min:null,max:null};closeSheet();render();}
/* CSV 다운로드 — 현재 월 내역 */
function exportCsv(){
  const mi=listMonthIdx;
  const rows=TXNS.filter(t=>txnM(t)===mi).sort((a,b)=>a.date.localeCompare(b.date));
  if(!rows.length){toast('내보낼 내역이 없습니다');return;}
  const esc=v=>'"'+String(v??'').replace(/"/g,'""')+'"';
  const csv='﻿'+[['날짜','적요','금액','지출구분','태그','메모'],
    ...rows.map(t=>[t.date,t.desc,t.amount,t.category,t.welfare,t.memo])]
    .map(r=>r.map(esc).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));

}

/* 결산 — 연간 통계 (월 결산 블록 순서: 수입 → 저축 → 고정지출 → 생활비 → 인세) */
let settleYear=+TODAY.slice(0,4);
function moveSettleYear(d){
  const minY=+ymOf(PAST_MIN).slice(0,4), maxY=+TODAY.slice(0,4);
  const n=settleYear+d;
  if(n<minY||n>maxY){toast(d>0?'다음 연도 데이터 없음':'이전 연도 데이터 없음');return;}
  settleYear=n;render();
}
function viewSettleYear(){
  const YI=yearIdxsAll(settleYear); /* 선택 연도의 월 인덱스 집계 */
  const incOf=i=>{const x=INCOMES[mKey(i)];return x?x.salary+x.etc.reduce((a,e)=>a+e.amount,0):0;};
  const incSum=YI.reduce((s,i)=>s+incOf(i),0);
  const savSum=YI.reduce((s,i)=>{const ym=ymOf(i);return s+SAVINGS.filter(x=>savActive(x,ym)).reduce((a,x)=>a+savAmount(x,ym),0);},0);
  const fixSum=YI.reduce((s,i)=>s+fixedInMonth(i).reduce((a,x)=>a+x.amount,0),0);
  const livSum=YI.reduce((s,i)=>s+liveLiving(i),0);
  const rySum=YI.reduce((s,i)=>s+monthDeposit(i),0);
  const donSum=YI.reduce((s,i)=>s+(RY_MONTH[i]?RY_MONTH[i].don:0),0);
  const maxL=Math.max(...YI.map(i=>liveLiving(i)),1);
  const maxI=Math.max(...YI.map(incOf),1);
  const maxS=Math.max(...YI.map(i=>liveSaving(i)),1);
  const mNum=i=>(+ymOf(i).slice(5,7))+'월';
  /* 카테고리 연간 합산 상위 — 지출 데이터 실시간 집계 */
  const catMap={}; YI.forEach(i=>liveCats(i).forEach(([k,v])=>{if(v>0)catMap[k]=(catMap[k]||0)+v;}));
  const catYear=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxC=catYear.length?catYear[0][1]:1;
  return `
  <div class="seg"><button class="${settleSeg==='month'?'on':''}" onclick="setSseg('month')">월 결산</button><button class="${settleSeg==='year'?'on':''}" onclick="setSseg('year')">연간 통계</button></div>
  <div class="month-row" style="padding-top:0">
    <button onclick="moveSettleYear(-1)">‹</button><span>${settleYear}년</span><button onclick="moveSettleYear(1)">›</button>
  </div>
  <div class="card hero">
    <div class="hstats">
      <div class="hs"><span>${settleYear}년 수입</span><b>${fmt(incSum)}원</b></div>
      <div class="hs"><span>${settleYear}년 저축·투자</span><b>${fmt(savSum)}원</b></div>
      <div class="hs"><span>${settleYear}년 생활비</span><b>${fmt(livSum)}원</b></div>
    </div>
  </div>
  <div class="card"><h3>수입 월별 추이</h3>
    <div class="chart" style="height:110px">${YI.map(i=>{const v=incOf(i);
    return `<div class="col" onclick="setSettle(${i});setSseg('month')"><span class="cv">${kfmt(v)}</span><i style="height:${Math.max(4,v/maxI*100)}%;background:#cfdcd4"></i><span>${mNum(i)}</span></div>`;}).join('')}</div>
  </div>
  <div class="card"><h3>저축·투자 월별 추이</h3>
    <div class="chart" style="height:110px">${YI.map(i=>`<div class="col" onclick="setSettle(${i});setSseg('month')"><span class="cv">${kfmt(liveSaving(i))}</span><i style="height:${Math.max(4,liveSaving(i)/maxS*100)}%;background:#cfdcd4"></i><span>${mNum(i)}</span></div>`).join('')}</div>
  </div>
  <div class="card"><h3>생활비 월별 추이 <span class="sub">월평균 ${fmt(livSum/(YI.length||1))}원</span></h3>
    <div class="chart" style="height:130px">${YI.map(i=>`<div class="col" onclick="setSettle(${i});setSseg('month')"><span class="cv">${kfmt(liveLiving(i))}</span><i style="height:${Math.max(4,liveLiving(i)/maxL*100)}%"></i><span>${mNum(i)}</span></div>`).join('')}</div>
  </div>
  <div class="card"><h3>카테고리별 연간 합산 <span class="sub">탭하면 아래에 월별 추이</span></h3>
    ${catYear.slice(0,8).map(([k,v])=>`<div style="padding:5px 0;cursor:pointer;${(yearCat||catYear[0][0])===k?'background:var(--accent-soft);border-radius:6px;padding:5px 8px;margin:0 -8px':''}" onclick="yearCat='${k}';render()">
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:12.5px"><span style="font-weight:600;display:flex;align-items:center">${cico(k)}${k}</span><b>${fmt(v)}원</b></div>
      <div class="minibar" style="margin-top:3px"><i style="width:${v/maxC*100}%"></i></div>
    </div>`).join('')}
    ${catYear.length>8?`<div class="sub" style="margin-top:6px;font-size:11.5px">외 ${catYear.length-8}개 카테고리</div>`:''}
  </div>
  ${catYear.length?(()=>{const sel=catMap[yearCat]!=null?yearCat:catYear[0][0];
  const arr=YI.map(i=>{const f=liveCats(i).find(x=>x[0]===sel);return f?f[1]:0;});const mx=Math.max(...arr,1);
  return `<div class="card"><h3><span style="display:flex;align-items:center;color:var(--ink)">${cico(sel)}${sel} 월별 추이</span><span class="sub">월평균 ${fmt(arr.reduce((s,v)=>s+v,0)/(arr.length||1))}원</span></h3>
    <div class="chart" style="height:110px">${arr.map((v,j)=>`<div class="col" onclick="setSettle(${YI[j]});setSseg('month')"><span class="cv">${kfmt(v)}</span><i style="height:${Math.max(3,v/mx*100)}%"></i><span>${mNum(YI[j])}</span></div>`).join('')}</div>
  </div>`;})():''}
  <div class="card" style="padding:13px 16px">
    <div class="setrow"><span class="lbl">올해 고정지출<small>월평균 ${fmt(fixSum/MLABELS.length)}원</small></span><span class="val">${fmt(fixSum)}원</span></div>
    <div class="setrow"><span class="lbl">올해 인세 입금</span><span class="val pos">+ ${fmt(rySum)}원</span></div>
    <div class="setrow"><span class="lbl">올해 기부</span><span class="val">${fmt(donSum)}원</span></div>
  </div>`;
}

function amtLabel(){
  const t=$('#sType').value;
  if(t==='예금')return'예치 금액 (시작월에 1회 반영, 만기월 자동 회수)';
  if(t==='적금'||t==='투자원금')return $('#sSub').value==='일회성'?'납입 금액 (시작월에 1회 반영)':'월 납입액 (매월 자동 반영)';
  return'입금액';
}
function saveSaving(){
  const type=$('#sType').value;
  const data={inst:$('#sInst').value,type,subtype:(type==='적금'||type==='투자원금')?$('#sSub').value:'',start:$('#sStart').value,maturity:$('#sMat').value,monthly:+$('#sAmt').value||0};
  if(!data.inst){toast('은행/증권사를 입력하세요');return;}
  if((type==='예금'||data.subtype==='일회성')&&!data.start){toast('일회성 납입은 시작월이 필요해요');return;}
  const over=$('#sOver');
  if(over&&over.value!=='')data.maturityOverride=+over.value;
  if(editSavingIdx!==null&&editSavingIdx!=='ry')SAVINGS[editSavingIdx]=data; else SAVINGS.push(data);
  closeSheet();toast(editSavingIdx!==null?'수정되었습니다':'등록되었습니다');render();
}
function delSaving(){SAVINGS.splice(editSavingIdx,1);closeSheet();toast('삭제되었습니다');render();}

  const wEnd=Math.min(mi+2,curIdx), wStart=Math.max(PAST_MIN,wEnd-5);
  const win=[];for(let i=wStart;i<=wEnd;i++)win.push({idx:i,v:monthDeposit(i),m:(+ymOf(i).slice(5,7))+'월'});

  ensureMonthIdx(mi);
  const dep=monthDeposit(mi), set=monthSettle(mi);
  /* 요약: 해당 월 입금 · 전월 대비 · 연초~해당월 누적 입금 (월별 현황 = 입금 기준) */
  const prevDep=mi-1>=PAST_MIN?monthDeposit(mi-1):0, diff=dep-prevDep;
  const selY=+ymOf(mi).slice(0,4);
  let ytdDep=0;for(let i=Math.max(PAST_MIN,idxOfYm(selY+'-01'));i<=mi;i++)ytdDep+=monthDeposit(i);
  /* 작품별 통계와 동일한 공통 정렬 · 판매종료이면서 해당 월 금액 없으면 미노출 · 과거 월은 정산 없는 작품도 미노출 */
  const sorted=[...WORKS].sort(workSort)
    .filter(w=>!(workStatus(w)==='판매종료'&&!workSettleAt(w,mi)&&!workDeposit(w,mi)))
    .filter(w=>mi>=0||workSettleAt(w,mi)||workDeposit(w,mi));
  return `
  <div class="month-row">
    <button onclick="swipeMonth(-1)">‹</button><span class="mlabel" onclick="openMonthPicker('royalty')">${mFull(mi)} ▾</span><button onclick="swipeMonth(1)">›</button>

  <div class="card hero">

      <div class="hs"><span>전월 대비</span><b class="${diff>=0?'up':''}">${diff>=0?'+':'−'} ${fmt(Math.abs(diff))}원</b></div>
      <div class="hs"><span>${selY}년 누적 입금</span><b>${fmt(ytdDep)}원</b></div>
    </div>
  </div>
  <div class="card">
    <h3>월별 입금액</h3>
    <div class="chart" style="height:120px">${win.map(x=>`
      <div class="col" onclick="setRmonth(${x.idx})">
        <span class="cv" style="color:${x.idx===mi?'var(--accent-deep)':'var(--sub)'}">${kfmt(x.v)}</span>
        <i style="height:${Math.max(4,x.v/maxV*100)}%;background:${x.idx===mi?'var(--accent)':'#cfdcd4'}"></i>
        <span style="${x.idx===mi?'color:var(--accent-deep);font-weight:800':''}">${x.m}</span>
      </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <h3>${mFull(mi)} 상세</h3>
    <div class="big-num">${fmt(dep)}<span style="font-size:15px;color:var(--sub)">원 입금</span></div>
    <div class="sub" style="margin-top:3px">총 정산금 ${fmt(set)}원${set!==dep?` · 선인세 차감 ${fmt(set-dep)}원`:''}</div>
    <div style="margin-top:8px">
    ${sorted.map(w=>{
      const s=workSettleAt(w,mi), d=workDeposit(w,mi), st=workStatus(w);
      const remain=Math.max(0,w.advance-w.hist.slice(0,mi+1).reduce((a,v)=>a+v,0));
      return `<div class="acct" style="cursor:pointer" onclick="royaltySeg='works';openWork('${w.title}')">
        <div class="top"><b>${w.title}<span class="tag ${st==='판매중'?'gg':st==='판매종료'?'rr':''}">${st}</span></b><b class="amt-edit" onclick="event.stopPropagation();openWorkSettle(${WORKS.indexOf(w)},${mi})">${fmt(d)}원</b></div>
        <div style="margin-top:4px;font-size:12px;color:var(--sub);line-height:1.75">
          정산금 ${fmt(s)}원${w.advance?`<br>선인세 차감 ${fmt(s-d)}원<br>잔여 선인세 ${fmt(remain)}원`:''}
        </div>

    </div>

}

/* 연도별 작품 인세 (2023~25 목데이터, 2026은 실데이터에서 계산) */
function yearWorks(y){ /* 작품별 연간 합계 — 정산금 기준 */
  if(+y<START_Y){ /* 과거 요약은 원래 키 기준 → 현재 제목으로 표시 */
    const m={};Object.entries(YEARLY_WORKS[y]||{}).forEach(([k,v])=>{const w=WORKS.find(x=>workKey(x)===k);m[w?w.title:k]=v;});
    return m;
  }
  const idxs=yearIdxs(y), m={};
  WORKS.forEach(w=>{const s=idxs.reduce((a,i)=>a+(w.hist[i]||0),0);if(s>0)m[w.title]=s;});
  const etc=idxs.reduce((a,i)=>a+(OTHER_ROYALTY[i]||0),0);if(etc>0)m['기타']=etc;
  return m;
}
function setRyear(y){royaltyYear=y;render();}
function moveRyear(d){
  const minY=Math.min(...Object.keys(YEARLY_WORKS).map(Number),START_Y), maxY=+TODAY.slice(0,4);
  const n=+royaltyYear+d;
  if(n<minY||n>maxY){toast(d>0?'다음 연도 데이터 없음':'이전 연도 데이터 없음');return;}
  royaltyYear=String(n);render();
}

  const YEARS=Object.keys(YEARLY_WORKS).sort().map(y=>[y, Object.values(YEARLY_WORKS[y]).reduce((s,v)=>s+v,0)]);
  for(let y=START_Y;y<=+curY;y++){YEARS.push([String(y), yearIdxs(y).reduce((s,i)=>s+monthSettle(i),0)]);}

  const baseSum=WORKS.reduce((s,w)=>s+w.base,0);

/* ===== 카드 내역 가져오기 — 실제 파싱 ===== */
let importMatrix=[],importRows=[],importMap=null;

/* CSV 상태머신 파서 — 따옴표 안 줄바꿈·이중따옴표 지원 (BC카드 등 멀티라인 셀 포맷 대응) */
function csvParse(text,delim){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){
      if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}
      else cur+=ch;
    }else{
      if(ch==='"')q=true;
      else if(ch===delim){row.push(cur);cur='';}
      else if(ch==='\n'||ch==='\r'){
        if(ch==='\r'&&text[i+1]==='\n')i++;
        row.push(cur);cur='';
        if(row.some(c=>c.trim()!==''))rows.push(row);
        row=[];
      }
      else cur+=ch;
    }
  }
  row.push(cur);
  if(row.some(c=>c.trim()!==''))rows.push(row);
  return rows;
}
function parseImportText(text){
  text=String(text||'').replace(/^﻿/,'');
  /* 구분자 감지: 따옴표 밖의 , 탭 ; 개수 비교 (따옴표 안 탭 패딩에 속지 않도록) */
  let q=false;const counts={',':0,'\t':0,';':0};
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(ch==='"')q=!q; else if(!q&&counts[ch]!==undefined)counts[ch]++;}
  const delim=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
  /* 셀 내부 줄바꿈·탭·연속 공백 정리 */
  return csvParse(text,delim).map(r=>r.map(c=>c.replace(/[\r\n\t]+/g,' ').replace(/\s+/g,' ').trim()));
}
function normDate(s){
  s=String(s||'').trim();
  let m=s.match(/(20\d{2})[.\-\/년\s]+(\d{1,2})[.\-\/월\s]+(\d{1,2})/);
  if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  m=s.match(/^(\d{1,2})[.\/](\d{1,2})$/);
  if(m)return TODAY.slice(0,4)+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  return null;
}
function normAmount(s){
  s=String(s||'').replace(/[,원\s]/g,'');
  if(!/^-?\d+(\.\d+)?$/.test(s))return null;
  return Math.round(+s);
}
/* 열 자동 감지: 헤더 키워드 우선, 없으면 값 스코어링 */
function detectMap(mx){
  const n=Math.max(...mx.map(r=>r.length));
  const hd=mx[0]||[];
  const find=(re,ex)=>hd.findIndex(h=>re.test(h||'')&&!(ex&&ex.test(h||'')));
  const hDate=find(/일시|거래일|이용일|승인일|일자|날짜/);
  const hAmt=find(/승인금액|이용금액|거래금액|금액|출금/,/취소|할인|포인트|할부/);
  const hDesc=find(/가맹점|적요|내용|사용처|상호|이용하신/);
  if(hDate>=0&&hAmt>=0&&hDesc>=0)return{d:hDate,a:hAmt,t:hDesc};
  const sc=Array.from({length:n},()=>({d:0,a:0,t:0}));
  mx.slice(0,15).forEach(r=>{for(let i=0;i<n;i++){const v=r[i]||'';
    if(normDate(v))sc[i].d++;
    if(normAmount(v)!==null&&!normDate(v))sc[i].a++;
    if(v&&normAmount(v)===null&&!normDate(v))sc[i].t+=v.length;}});
  const best=key=>sc.reduce((b,s,i)=>s[key]>sc[b][key]?i:b,0);
  const d=best('d');let a=best('a');if(a===d)a=(d+1)%n;
  let t=best('t');if(t===d||t===a)t=[...Array(n).keys()].find(i=>i!==d&&i!==a)??0;
  return {d,a,t};
}
function buildImportRows(){
  const mp=importMap;
  importRows=[];
  importMatrix.forEach(r=>{
    const d=normDate(r[mp.d]), amt=normAmount(r[mp.a]), desc=(r[mp.t]||'').trim();
    if(!d||amt===null||!desc)return; /* 헤더/빈 행 스킵 */
    const dup=TXNS.some(t=>t.date===d&&t.amount===amt&&t.desc===desc);
    importRows.push({date:d,desc,amount:amt,category:classify(desc),auto:!!classify(desc),dup});
  });
}

/* 엑셀 파서(SheetJS) — 엑셀 업로드 시에만 CDN에서 지연 로드 */
let xlsxLoading=null;
function loadXLSX(){
  if(typeof XLSX!=='undefined')return Promise.resolve();
  if(xlsxLoading)return xlsxLoading;
  xlsxLoading=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=res;s.onerror=()=>{xlsxLoading=null;rej();};
    document.head.appendChild(s);
  });
  return xlsxLoading;
}
function handleImportFile(input){
  const f=input.files[0]; if(!f)return;
  const ext=(f.name.split('.').pop()||'').toLowerCase();
  const rd=new FileReader();
  rd.onload=async()=>{
    if(ext==='xlsx'||ext==='xls'){
      try{
        await loadXLSX();
        const wb=XLSX.read(rd.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        importMatrix=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''})
          .map(r=>r.map(c=>String(c??'').replace(/[\r\n\t]+/g,' ').replace(/\s+/g,' ').trim()))
          .filter(r=>r.some(c=>c!==''));
        if(!importMatrix.length){toast('표 형식을 인식하지 못했습니다');return;}
        afterMatrix();
      }catch(e){toast('엑셀 파일을 읽지 못했어요 — 네트워크 연결 확인');}
      input.value='';
      return;
    }
    let text=new TextDecoder('utf-8').decode(rd.result);
    if((text.match(/�/g)||[]).length>2) text=new TextDecoder('euc-kr').decode(rd.result); /* 한글 인코딩 자동 처리 */
    startPreview(text);
    input.value='';
  };
  rd.readAsArrayBuffer(f);
}
function parseFromPaste(){
  const t=$('#impPaste').value;
  if(!t.trim()){toast('내용을 붙여넣어 주세요');return;}
  startPreview(t);
}
function startPreview(text){
  importMatrix=parseImportText(text);
  if(!importMatrix.length){toast('표 형식을 인식하지 못했습니다');return;}
  afterMatrix();
}
function afterMatrix(){
  const saved=localStorage.getItem('importMap');
  importMap=saved?JSON.parse(saved):detectMap(importMatrix);
  const n=Math.max(...importMatrix.map(r=>r.length));
  if(importMap.d>=n||importMap.a>=n||importMap.t>=n)importMap=detectMap(importMatrix);
  buildImportRows();
  /* 저장된 열 매핑이 다른 카드사 포맷이면 자동 재감지 */
  if(!importRows.length){importMap=detectMap(importMatrix);buildImportRows();}
  renderImportPreview();
}
function setImpMap(key,val){importMap[key]=+val;buildImportRows();renderImportPreview();}
function renderImportPreview(){
  const n=Math.max(...importMatrix.map(r=>r.length));

  <div class="batchrow"><span class="bn">열 매핑</span><span class="bp">날짜</span>${colSel('d')}<span class="bp">적요</span>${colSel('t')}<span class="bp">금액</span>${colSel('a')}</div>
  ${importRows.length===0?'<div class="note">인식된 내역이 없습니다 — 열 매핑을 조정해 보세요</div>':`
  <div class="sub" style="margin:10px 0">총 ${importRows.length}건 · 자동분류 <b class="pos">${auto}</b> · 분류 필요 <b style="color:var(--amber)">${manual}</b> · 중복 <b class="neg">${dup}</b></div>
  <div class="tablewrap" style="box-shadow:none;border:1px solid var(--line);max-height:40dvh;overflow-y:auto">
    <table class="data" style="min-width:480px">
      <thead><tr><th>날짜</th><th>적요</th><th class="num">금액</th><th>지출구분</th></tr></thead>
      <tbody>${importRows.map((r,i)=>`<tr class="${!r.category?'unclass':''} ${r.dup?'dup':''}">
        <td class="sub">${r.date.slice(5).replace('-','.')}</td>
        <td class="desc">${r.desc}${r.dup?' <span class="chip" style="background:#f9e9e9;color:var(--red)">중복</span>':''}${r.auto&&r.category?' <span class="chip" style="background:var(--accent-soft);color:var(--accent)">자동</span>':''}</td>
        <td class="num">${fmt(r.amount)}</td>

          <option value="">${!r.category?'⚠ 선택':'—'}</option>
          ${CATS.map(c=>`<option value="${c.name}" ${r.category===c.name?'selected':''}>${c.short}</option>`).join('')}
        </select></td>
      </tr>`).join('')}</tbody>

  </div>
  <button class="save-btn" style="margin-top:12px" onclick="doImport()">중복 제외 ${importRows.length-dup}건 등록</button>`}

  openSheetEl();
}
function doImport(){

const GOOGLE_CLIENT_ID='678418587056-3b5b8l2frhjlmjsh6clh2967isnnkjgk.apps.googleusercontent.com';
const G_SCOPES='https://www.googleapis.com/auth/drive.file';
const DATA_FILE_NAME='my-budget-data.json';
const LS_KEY='bud_v1';
let gToken=null, tokenClient=null;
let syncStatus={connected:false, busy:false,
  last:localStorage.getItem('bud_lastSync')||null,

const SYNC_COLS={
  transactions:{get:()=>TXNS,set:v=>TXNS=v},
  works:{get:()=>WORKS,set:v=>WORKS=v},
  accounts:{get:()=>ACCOUNTS,set:v=>ACCOUNTS=v},
  isa_items:{get:()=>ISA_ITEMS,set:v=>ISA_ITEMS=v},
  savings:{get:()=>SAVINGS,set:v=>SAVINGS=v},
  fixed:{get:()=>FIXED,set:v=>FIXED=v},
  ry_month:{get:()=>RY_MONTH,set:v=>RY_MONTH=v},
  balance:{get:()=>BALANCE.map(v=>({v})),set:v=>BALANCE=v.map(x=>x.v)},
  categories:{get:()=>CATS,set:v=>CATS=v},
  rules:{get:()=>RULES,set:v=>RULES=v},
  checklist:{get:()=>CHECKS,set:v=>CHECKS=v},
  incomes:{get:()=>Object.entries(INCOMES).map(([k,v])=>({k,salary:v.salary,etc:v.etc})),set:v=>{INCOMES={};v.forEach(x=>INCOMES[x.k]={salary:x.salary||0,etc:x.etc||[]});}},
  other_royalty:{get:()=>OTHER_ROYALTY.map(v=>({v})),set:v=>OTHER_ROYALTY=v.map(x=>x.v||0)},
  /* 구버전 일회성 저축 데이터 → 예금 상품으로 자동 이관 */
  lumps:{get:()=>[],set:v=>{(v||[]).forEach(l=>{if(l&&l.amount&&!SAVINGS.some(s=>s.type==='예금'&&s.start===l.ym&&s.monthly===l.amount))SAVINGS.push({inst:l.name||'미등록',type:'예금',subtype:'',monthly:l.amount,start:l.ym,maturity:''});});}},
  past_hist:{get:()=>Object.entries(PAST_HIST).map(([k,v])=>({k,v})),set:v=>{PAST_HIST={};(v||[]).forEach(x=>PAST_HIST[x.k]=x.v);}},
  yearly_works:{get:()=>Object.entries(YEARLY_WORKS).map(([k,v])=>({k,v})),set:v=>{YEARLY_WORKS={};(v||[]).forEach(x=>YEARLY_WORKS[x.k]=x.v);}},
  ry_saving:{get:()=>[RY_SAVING],set:v=>{if(v&&v[0])RY_SAVING=v[0];}},
  meta:{get:()=>[{k:'budget_total',v:BUDGET_TOTAL},{k:'ry_base',v:RY_BASE}],set:v=>{(v||[]).forEach(x=>{if(x.k==='budget_total'&&x.v)BUDGET_TOTAL=x.v;if(x.k==='ry_base'&&x.v!=null)RY_BASE=x.v;});}},
};
function collectData(){const d={};Object.entries(SYNC_COLS).forEach(([k,c])=>d[k]=c.get());return d;}
function applyData(data){
  if(typeof data==='string'){try{data=JSON.parse(data);}catch(e){return false;}}
  if(!data) return false;
  let loaded=0;
  Object.entries(SYNC_COLS).forEach(([k,c])=>{
    if(Array.isArray(data[k])&&data[k].length){c.set(data[k]);loaded++;}
  });
  if(data.updatedAt) dataUpdatedAt=data.updatedAt;
  ensureMonths(); /* 복원한 데이터가 과거 월 길이면 현재 월까지 패딩 */
  return loaded>0;
}
/* ----- 로컬 저장 (기본 저장소) ----- */
function saveLocal(){
  dataUpdatedAt=new Date().toISOString();
  const d=collectData(); d.updatedAt=dataUpdatedAt;
  try{ localStorage.setItem(LS_KEY, JSON.stringify(d)); }catch(e){}
  return d;
}
function loadLocal(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw&&applyData(raw)) render();
  }catch(e){}
}
/* 변경 발생 시: 즉시 로컬 저장 + 1.5초 뒤 드라이브 업로드 (디바운스) */
let cloudTimer=null;
function scheduleSync(){
  saveLocal();
  if(!gToken||!syncStatus.fileId) return;
  clearTimeout(cloudTimer);
  cloudTimer=setTimeout(async()=>{
    try{ await uploadData(); markSynced(); }catch(e){}
  },1500);
}
function markSynced(){ syncStatus.last=new Date().toISOString(); localStorage.setItem('bud_lastSync',syncStatus.last); }
/* ----- GIS 토큰 발급/캐시/무음 갱신 ----- */
function initTokenClient(){
  if(tokenClient) return true;
  if(typeof google==='undefined'||!google.accounts) return false;
  tokenClient=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID, scope:G_SCOPES, callback:onGToken});
  return true;
}
function connectDrive(){
  if(!initTokenClient()) return alert('구글 연결 스크립트를 아직 불러오는 중이에요. 잠시 후 다시 시도해주세요.');
  tokenClient.requestAccessToken({prompt:''});
}
let pendingSilent=false;
function cacheToken(tok,expiresIn){
  localStorage.setItem('bud_tok',tok);
  localStorage.setItem('bud_tokExp',String(Date.now()+((+expiresIn||3600)-90)*1000));
}
function clearTokenCache(){ localStorage.removeItem('bud_tok'); localStorage.removeItem('bud_tokExp'); }
/* 팝업 차단 회피: 다음 화면 터치 시점(사용자 제스처)에 무음 토큰 요청 */
function armSilentAuth(){
  if(pendingSilent) return;
  pendingSilent=true;
  document.addEventListener('pointerdown',()=>{ pendingSilent=false;
    if(initTokenClient()) tokenClient.requestAccessToken({prompt:''});
  },{once:true});
}
/* 선제 갱신: 만료 10분 전이면 화면 터치 시 무음 재발급 */
let lastAuthTry=0;
function maybeRefreshToken(){
  try{
    if(!driveOn()) return;
    const exp=+localStorage.getItem('bud_tokExp')||0;
    if(Date.now()<exp-10*60*1000) return;
    if(Date.now()-lastAuthTry<60*1000) return;
    lastAuthTry=Date.now();
    if(initTokenClient()) tokenClient.requestAccessToken({prompt:''});
  }catch(e){}
}
document.addEventListener('pointerdown',maybeRefreshToken,{passive:true});
function onGToken(resp){
  if(resp.error){ syncStatus.connected=false; armSilentAuth(); return; }
  const first=!driveOn();
  gToken=resp.access_token; syncStatus.connected=true;
  localStorage.setItem('bud_syncOn','1');
  cacheToken(resp.access_token,resp.expires_in);
  if(first){ closeSheet(); toast('구글 드라이브에 연결되었습니다'); render(); }
  syncNow();
}
function disconnectDrive(){
  if(gToken&&typeof google!=='undefined') try{ google.accounts.oauth2.revoke(gToken); }catch(e){}
  gToken=null; syncStatus.connected=false;
  localStorage.removeItem('bud_syncOn'); clearTokenCache();
  render();
}
/* ----- Drive REST 직접 호출 ----- */
async function gfetch(url,opt={}){
  opt.headers=Object.assign({},opt.headers,{Authorization:'Bearer '+gToken});
  const r=await fetch(url,opt);
  if(r.status===404&&syncStatus.fileId&&url.indexOf(syncStatus.fileId)>=0){syncStatus.fileId=null;localStorage.removeItem('bud_driveFileId');}
  if(r.status===401){ gToken=null; syncStatus.connected=false; clearTokenCache(); armSilentAuth(); throw new Error('auth'); }
  if(!r.ok) throw new Error('http '+r.status);
  return r;
}
async function findDataFile(){
  if(syncStatus.fileId) return syncStatus.fileId;
  const q=encodeURIComponent(`name='${DATA_FILE_NAME}' and trashed=false`);
  const r=await gfetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
  const j=await r.json();
  if(j.files&&j.files.length){ syncStatus.fileId=j.files[0].id; localStorage.setItem('bud_driveFileId',syncStatus.fileId); return syncStatus.fileId; }
  return null;
}
async function createDataFile(){
  const boundary='bud'+Date.now();
  const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify({name:DATA_FILE_NAME,mimeType:'application/json'})}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(saveLocal())}\r\n--${boundary}--`;
  const r=await gfetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    {method:'POST',headers:{'Content-Type':'multipart/related; boundary='+boundary},body});
  const j=await r.json();
  syncStatus.fileId=j.id; localStorage.setItem('bud_driveFileId',j.id);
}
async function uploadData(){
  if(!syncStatus.fileId) return;
  const d=collectData(); d.updatedAt=dataUpdatedAt||new Date().toISOString();
  await gfetch(`https://www.googleapis.com/upload/drive/v3/files/${syncStatus.fileId}?uploadType=media`,
    {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
}
/* 최신본 비교 동기화: updatedAt이 최신인 쪽을 채택 */
async function syncNow(manual){
  if(!gToken||syncStatus.busy){ if(manual&&!gToken) toast('재연결 대기 중 — 화면을 한 번 터치해주세요'); return; }
  syncStatus.busy=true;
  try{
    const id=await findDataFile();
    if(id){
      const r=await gfetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
      let remote=null; try{ remote=await r.json(); }catch(e){}
      if(remote&&remote.updatedAt&&(!dataUpdatedAt||remote.updatedAt>dataUpdatedAt)){
        if(applyData(remote)){ localStorage.setItem(LS_KEY,JSON.stringify(remote)); render(); if(manual) toast('드라이브에서 불러왔습니다'); }
      } else {
        await uploadData(); if(manual) toast('드라이브에 저장했습니다');
      }
    } else {
      await createDataFile(); if(manual) toast('드라이브에 저장했습니다');
    }
    markSynced();
  }catch(e){ if(manual) toast('동기화 실패 — 네트워크 확인'); }
  syncStatus.busy=false;
}
function syncLabel(){
  if(!syncStatus.last) return '동기화 이력 없음';
  const d=new Date(syncStatus.last);
  return '마지막 동기화 '+(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
/* 자동 연결: 캐시 토큰이 유효하면 즉시 재사용, 만료면 첫 터치 시 무음 재발급 */
window.addEventListener('load',()=>{
  if(!driveOn()) return;
  const tok=localStorage.getItem('bud_tok'), exp=+localStorage.getItem('bud_tokExp')||0;
  if(tok&&Date.now()<exp){ gToken=tok; syncStatus.connected=true; syncNow(); }
  else armSilentAuth();
});
/* 모든 사용자 액션(토스트 발생)에 저장 예약을 연결 */
const _origToast=toast;
toast=function(m){_origToast(m);if(m&&!m.includes('동기화')&&!m.includes('불러왔')&&!m.includes('저장했')&&!m.includes('드라이브'))scheduleSync();};
loadLocal();

/* PWA: 앱처럼 설치하기 (GitHub Pages 배포 시) */
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

/* 좌우 스와이프 감지 (월 이동) */
(function(){
  const el=$('#main'); if(!el||!el.addEventListener)return;
  let x0=0,y0=0;
  el.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;y0=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
    if(Math.abs(dx)<60||Math.abs(dy)>50)return;
    swipeMonth(dx<0?1:-1); /* 왼쪽 스와이프 = 다음 달 */
  },{passive:true});
})();
</script>
