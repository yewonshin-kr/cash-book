<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>가계부 v0.14</title>
<style>
:root{
  --bg:#f5f6f5; --card:#ffffff; --ink:#22262a; --sub:#8b9198; --line:#eceeed;
  --accent:#4a7c64; --accent-deep:#2e5443; --accent-soft:#eef4f0;
  --green:#3e8e5f; --red:#d95757; --amber:#c98a2e; --amber-soft:#fbf5e9;
  --radius:8px; --shadow:0 1px 2px rgba(25,32,28,.05);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#e2e5e3;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;color:var(--ink)}
svg.i{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block}
/* Galaxy S26 Ultra (CSS 뷰포트 ≈ 412×915) 기준 최적화 */
#frame{max-width:412px;margin:0 auto;min-height:100dvh;background:var(--bg);position:relative;box-shadow:0 0 40px rgba(0,0,0,.1);display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 1px 4px rgba(25,32,28,.05);padding:calc(14px + env(safe-area-inset-top)) 18px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
header h1{font-size:18px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
header .back{border:0;background:var(--bg);width:29px;height:29px;border-radius:7px;font-size:15px;color:var(--ink);cursor:pointer}
.gear{border:0;background:var(--bg);width:33px;height:33px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub)}
.month-row{display:flex;justify-content:center;align-items:center;gap:16px;padding:10px 0 12px;font-weight:800;font-size:14.5px}
.month-row button{border:0;background:var(--card);width:27px;height:27px;border-radius:7px;box-shadow:var(--shadow);font-size:13px;color:var(--sub);cursor:pointer}
main{flex:1;padding:4px 14px 96px;overflow-x:hidden}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:10px}
/* 타이포 하이라키: 페이지 타이틀 18 > 섹션 14.5 > 카드(영역) 타이틀 13.5(잉크) > 행 13~13.5 > 보조 11.5~12.5(그레이) */
.card h3{font-size:13.5px;color:var(--ink);font-weight:800;letter-spacing:-.2px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.card h3 .sub{font-weight:500}
.card h3 .more{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}
.big-num{font-size:27px;font-weight:800;letter-spacing:-.5px}
.sub{color:var(--sub);font-size:12.5px}
.pos{color:var(--green)} .neg{color:var(--red)}
.bar{height:8px;background:#f0f2f1;border-radius:4px;overflow:hidden;margin:10px 0 6px}
.bar>i{display:block;height:100%;border-radius:4px;background:var(--accent);transition:width .5s}
.bar.warn>i{background:var(--amber)} .bar.over>i{background:var(--red)}
.minibar{height:4px;background:#f0f2f1;border-radius:2px;margin-top:4px;overflow:hidden}
.minibar>i{display:block;height:100%;border-radius:2px;background:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.grid2 .card{margin:0}
/* checklist */
.check{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.check:last-child{border-bottom:0}
.check .st{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:800}
.check.done .st{background:var(--accent-soft);color:var(--accent)}
.check.todo .st{background:#f0f2f1;color:#b8bdc2}
.check.warn .st{background:var(--amber-soft);color:var(--amber)}
.check .tx{flex:1;font-size:13.5px;font-weight:600}
.check.done .tx{color:var(--sub);text-decoration:line-through;text-decoration-color:#ccd1ce}
.check .hint{font-size:11.5px;color:var(--sub);font-weight:500}
.check .goarr{color:#c5cac7;font-size:14px}
/* chips */
.chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;vertical-align:1px}
.chip.wc{background:#f4efe4;color:#a07a2c} .chip.wp{background:var(--accent-soft);color:var(--accent)} .chip.ry{background:#e9edf4;color:#5b6b8c}
.filters{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;border:1px solid var(--line);background:var(--card);border-radius:7px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--sub);cursor:pointer}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.fchip.alert{border-color:var(--amber);color:var(--amber)}
.fchip.alert.on{background:var(--amber);color:#fff}
/* data table */
.tablewrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow-x:auto;margin-bottom:10px}
table.data{border-collapse:collapse;width:100%;min-width:620px;font-size:12.5px}
table.data th{font-size:11px;color:var(--sub);font-weight:700;text-align:left;padding:10px;border-bottom:1.5px solid var(--line);white-space:nowrap;background:#fafbfa;cursor:pointer;user-select:none}
table.data th.num{text-align:right}
table.data td{padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:middle}
table.data tr:last-child td{border-bottom:0}
table.data td.num{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
table.data td.desc{max-width:170px;overflow:hidden;text-overflow:ellipsis;font-weight:600}
table.data tr.unclass{background:var(--amber-soft)}
table.data tr.dup td{opacity:.55}
select.catsel{border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-size:11.5px;background:#fff;font-family:inherit;max-width:120px;color:var(--ink)}
tr.unclass select.catsel{border-color:var(--amber);background:#fffdf6}
.tfoot{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;font-size:12.5px;color:var(--sub);font-weight:600;border-top:1.5px solid var(--line)}
.toolbar{display:flex;gap:7px;margin-bottom:10px}
.toolbar button{border:1px solid var(--line);background:var(--card);border-radius:7px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.toolbar button svg.i{width:14px;height:14px}
.toolbar .primary{background:var(--accent);border-color:var(--accent);color:#fff}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;background:var(--amber);color:#fff;font-size:9.5px;font-weight:800;padding:0 4px}
/* segmented */
.seg{display:flex;background:#e9ebe9;border-radius:8px;padding:3px;margin-bottom:12px}
.seg button{flex:1;border:0;background:transparent;padding:8px 4px;border-radius:6px;font-size:12.5px;font-weight:700;color:var(--sub);cursor:pointer;font-family:inherit}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
/* settle rows */
.setrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.setrow:last-child{border-bottom:0}
.setrow .lbl{color:var(--ink);font-weight:600}
.setrow .lbl small{display:block;color:var(--sub);font-weight:500;font-size:11.5px;margin-top:1px}
.setrow .val{font-weight:700}
.setrow.head{font-weight:800;font-size:14.5px}
.setrow.indent{padding-left:14px;font-size:13px}
.setrow.indent .lbl{color:var(--sub);font-weight:500}
.setrow.indent .val{font-weight:600}
.hl{background:var(--accent-soft);border-radius:7px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.hl b{font-size:14px} .hl .v{font-size:16px;font-weight:800;color:var(--accent-deep)}
/* chart */
.chart{display:flex;align-items:flex-end;gap:6px;height:105px;padding-top:8px}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.chart .col i{width:100%;max-width:26px;border-radius:3px 3px 1px 1px;background:var(--accent);display:block}
.chart .col span{font-size:10px;color:var(--sub);font-weight:600}
.chart .col .cv{font-size:9px;font-weight:700;color:var(--sub);letter-spacing:-.2px;white-space:nowrap}
.chart .col{cursor:pointer}
/* asset */
.acct{padding:12px 0;border-bottom:1px solid var(--line)}
.acct:last-child{border-bottom:0}
.acct .top{display:flex;justify-content:space-between;align-items:baseline}
.acct .top b{font-size:13.5px;font-weight:700}
.acct .top .rate{font-size:12.5px;font-weight:800}
.acct .btm{display:flex;justify-content:space-between;margin-top:3px;font-size:12px;color:var(--sub)}
.tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#f0f2f1;color:var(--sub);margin-left:6px;vertical-align:1px}
.tag.gg{background:var(--accent-soft);color:var(--accent)}
.tag.rr{background:#f6eded;color:#b06060}
.pre{color:var(--amber);font-weight:700;font-size:12px;background:var(--amber-soft);padding:2px 7px;border-radius:5px}
.workrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
.workrow:last-child{border-bottom:0}
.workrow .wi{flex:1;min-width:0}
.workrow .goarr{color:#c5cac7}
/* info rows */
.inforow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.inforow:last-child{border-bottom:0}
.inforow .k{color:var(--sub);font-weight:500}
.inforow .v{font-weight:700}
/* bottom nav */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:412px;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:9px 4px calc(9px + env(safe-area-inset-bottom));z-index:30}
nav button{position:relative;border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:700;color:#b3b8bc;cursor:pointer;width:60px}
nav button.on{color:var(--accent-deep)}
/* sheet */
.overlay{position:fixed;inset:0;background:rgba(20,26,22,.45);z-index:40;display:none}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translate(-50%,105%);width:100%;max-width:412px;background:var(--card);border-radius:14px 14px 0 0;z-index:50;padding:18px 18px calc(18px + env(safe-area-inset-bottom));transition:transform .28s cubic-bezier(.3,1,.4,1);max-height:92dvh;overflow-y:auto}
.sheet.show{transform:translate(-50%,0)}
.sheet .grab{width:36px;height:4px;border-radius:2px;background:#dde0de;margin:0 auto 14px}
.sheet h2{font-size:15.5px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.sheet h2 .close{border:0;background:#f0f2f1;width:27px;height:27px;border-radius:7px;font-size:12px;color:var(--sub);cursor:pointer}
.frow{display:flex;gap:9px;margin-bottom:9px}
.frow input,.frow select{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;font-size:13.5px;font-family:inherit;background:var(--card);min-width:0;color:var(--ink)}
.frow input:focus,.frow select:focus{outline:none;border-color:var(--accent)}
.flabel{font-size:11.5px;font-weight:700;color:var(--sub);margin:4px 2px 6px}
.save-btn{width:100%;border:0;background:var(--accent);color:#fff;font-size:14.5px;font-weight:800;padding:13px;border-radius:8px;cursor:pointer;font-family:inherit}
.save-btn:disabled{background:#c9cdc9}
.save-btn.ghost{background:transparent;color:var(--red);padding:9px}
.upload-zone{border:1.5px dashed #c8cec9;border-radius:8px;padding:24px 16px;text-align:center;color:var(--sub);font-size:12.5px;font-weight:600;margin-bottom:10px;cursor:pointer;background:#fafbfa}
.upload-zone b{display:block;font-size:14px;color:var(--ink);margin-bottom:4px}
textarea.paste{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12.5px;font-family:inherit;min-height:76px;resize:vertical;margin-bottom:10px}
/* batch rows */
.batchrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.batchrow:last-child{border-bottom:0}
.batchrow .bn{flex:1;font-size:13px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.batchrow .bp{font-size:10.5px;color:var(--sub);white-space:nowrap}
.batchrow input{width:96px;border:1.5px solid var(--line);border-radius:7px;padding:8px 9px;font-size:13px;text-align:right;font-family:inherit}
.batchrow input:focus{outline:none;border-color:var(--accent)}
.batchrow select.mini{border:1px solid var(--line);border-radius:6px;padding:6px 4px;font-size:11px;font-family:inherit;color:var(--sub);background:#fff}
.net{font-size:10.5px;color:var(--accent);font-weight:700;width:70px;text-align:right;white-space:nowrap}
.note{font-size:11.5px;color:var(--sub);text-align:center;padding:12px 20px;line-height:1.6}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:8px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat3 .card{margin:0;padding:12px}
.stat3 .card .sub{font-size:10.5px}
.stat3 .card b{font-size:14px;display:block;margin-top:3px;letter-spacing:-.3px}
.stat3 .card.em{background:var(--accent-soft)}
.stat3 .card.em .sub{color:var(--accent)}
.stat3 .card.em b{color:var(--accent-deep)}
.hero{background:var(--accent-deep);color:#fff}
.hero h3{color:#a8c4b5!important}
.hero h3.big{font-size:16px;color:#fff!important;margin-bottom:12px}
/* 홈 섹션 타이틀 */
.sect{display:flex;justify-content:space-between;align-items:baseline;font-size:14.5px;font-weight:800;letter-spacing:-.3px;margin:20px 6px 8px}
.sect .more{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}
.sect .sub{font-weight:500}
.hero .big-num{color:#fff}
.hero .sub{color:#a8c4b5}
/* 히어로 내부 3분할 통계 */
.hstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.hstats .hs span{display:block;color:#a8c4b5;font-size:10.5px;font-weight:700}
.hstats .hs b{display:block;color:#fff;font-size:14px;margin-top:4px;letter-spacing:-.3px}
/* 히어로 내부 요약 행 */
.hrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:13.5px}
.hrow:last-child{border-bottom:0}
.hrow span{color:#a8c4b5;font-weight:600}
.hrow b{color:#fff;font-weight:700}
.hrow b.up{color:#8fd4ac}
.hrow.dim span{color:#7d998b;font-weight:500}
.hrow.dim b{color:#9db8ab;font-weight:500}
.cico{width:26px;height:26px;border-radius:6px;background:var(--accent-soft);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0;vertical-align:middle}
.cico svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div id="frame">
  <header id="header"></header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
/* ============ 아이콘 (원톤 SVG) ============ */
const IC={
 home:'<svg class="i" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>',
 list:'<svg class="i" viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2z"/><path d="M9 8h6M9 12h6"/></svg>',
 chart:'<svg class="i" viewBox="0 0 24 24"><path d="M4 20V10M11 20V4M18 20v-7"/><path d="M2 20h20"/></svg>',
 trend:'<svg class="i" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/></svg>',
 pen:'<svg class="i" viewBox="0 0 24 24"><path d="M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z"/></svg>',
 gear:'<svg class="i" viewBox="0 0 24 24"><path d="M4 8h10M18 8h2M4 16h2M10 16h10"/><circle cx="16" cy="8" r="2"/><circle cx="8" cy="16" r="2"/></svg>',
 up:'<svg class="i" viewBox="0 0 24 24"><path d="M12 17V5M6 11l6-6 6 6"/><path d="M4 21h16"/></svg>',
 plus:'<svg class="i" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>',
 dl:'<svg class="i" viewBox="0 0 24 24"><path d="M12 5v12M6 11l6 6 6-6"/><path d="M4 21h16"/></svg>',
};
/* 카테고리 아이콘 (원톤) */
const CI={
 '외식/배달':'<path d="M4 13a8 8 0 0016 0H4z"/><path d="M12 5v3M8 6l1 2M16 6l-1 2"/>',
 '카페':'<path d="M5 8h11v6a4 4 0 01-4 4H9a4 4 0 01-4-4V8z"/><path d="M16 9h2a2 2 0 010 4h-2"/>',
 '식료품':'<path d="M5 5h2l2 11h9l2-8H8"/><circle cx="10" cy="20" r="1.3"/><circle cx="17" cy="20" r="1.3"/>',
 '교통비':'<path d="M5 17l1-5 2-3h8l2 3 1 5z"/><path d="M7 17v2M17 17v2"/>',
 '생활용품':'<path d="M5 9h14l-1.5 11h-11z"/><path d="M9 9a3 3 0 016 0"/>',
 '옷/뷰티':'<path d="M8 4l4 3 4-3 4 4-3 2v10H7V10L4 8z"/>',
 '컨텐츠':'<path d="M5 4h13v16H5z"/><path d="M9 4v16"/>',
 '티켓/굿즈':'<path d="M4 8h16v3a2 2 0 000 4v3H4v-3a2 2 0 000-4z"/><path d="M12 9v9" stroke-dasharray="2 2"/>',
 'e스포츠':'<path d="M7 9h10l2 7a2 2 0 01-3.5 1.5L14 15h-4l-1.5 2.5A2 2 0 015 16z"/><path d="M9 12h3M10.5 10.5v3"/>',
 '관리비':'<path d="M6 21V5h8v16M14 9h4v12"/><path d="M9 8h2M9 12h2M9 16h2"/>',
 '통신비':'<rect x="8" y="3" width="8" height="18" rx="2"/><path d="M11 18h2"/>',
 '가스비':'<path d="M12 3s5 5 5 10a5 5 0 01-10 0c0-3 2-5 3-7 0 2 2 3 2 3z"/>',
 '자동차':'<path d="M5 16l1-5 2-3h8l2 3 1 5z"/><circle cx="8" cy="18" r="1.3"/><circle cx="16" cy="18" r="1.3"/>',
 '공부':'<path d="M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z"/>',
 '기타':'<path d="M4 8l8-4 8 4v8l-8 4-8-4z"/><path d="M4 8l8 4 8-4M12 12v8"/>',
 '인세 지출':'<path d="M16.5 3.5l4 4L7 21H3v-4L16.5 3.5z"/>',
};
const cico=k=>`<span class="cico"><svg viewBox="0 0 24 24">${CI[k]||CI['기타']}</svg></span>`;

/* ============ 목데이터 ============ */
const fmt=n=>(n<0?'-':'')+Math.abs(Math.round(n)).toLocaleString('ko-KR');
const CATS=[
 {name:'외식/배달',short:'외식/배달',budget:300000},
 {name:'카페(커피, 디저트)',short:'카페',budget:100000},
 {name:'식료품(마트,편의점)',short:'식료품',budget:300000},
 {name:'교통비',short:'교통비',budget:50000},

/* CSV 다운로드 — 현재 월 내역 */
function exportCsv(){
  const mi=listMonthIdx;
  const rows=TXNS.filter(t=>txnM(t)===mi).sort((a,b)=>a.date.localeCompare(b.date));
  if(!rows.length){toast('내보낼 내역이 없습니다');return;}
  const esc=v=>'"'+String(v??'').replace(/"/g,'""')+'"';
  const csv='﻿'+[['날짜','적요','금액','지출구분','태그','메모'],
    ...rows.map(t=>[t.date,t.desc,t.amount,t.category,t.welfare,t.memo])]
    .map(r=>r.map(esc).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`지출_2026_${String(mi+1).padStart(2,'0')}월.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV 다운로드 완료');
}
function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=-1;}render();}
function setCat(id,v){TXNS.find(x=>x.id===id).category=v;toast(v?`'${catShort(v)}' 분류 완료`:'미분류로 변경');render();}

  const maxS=Math.max(...MKEYS.map(k=>MONTHLY[k].saving));

  </div>
  <div class="card"><h3>생활비 월별 추이 <span class="sub">월평균 ${fmt(livSum/MKEYS.length)}원</span></h3>
    <div class="chart" style="height:130px">${MKEYS.map((k,i)=>`<div class="col" onclick="setSettle(${i});setSseg('month')"><span class="cv">${kfmt(MONTHLY[k].living)}</span><i style="height:${Math.max(4,MONTHLY[k].living/maxL*100)}%"></i><span>${k}</span></div>`).join('')}</div>

      <div class="minibar" style="margin-top:3px"><i style="width:${v/maxC*100}%"></i></div>

  </div>

    ${ACCOUNTS.map(a=>{const r=li>=0?accRate(a,li):null;
    return `<div class="acct"><div class="top"><b>${a.name}<span class="tag">${a.tag}</span></b><span class="rate">${fmtR(r)}</span></div>

/* 항목 통합 입력: 원금 + 평가금 + 배당금(수량×주당) 한 번에 */
function openItemInput(ii,ev){
  if(ev)ev.stopPropagation();
  const it=ISA_ITEMS[ii], mi=investMonthIdx;
  $('#sheet').innerHTML=`
  <div class="grab"></div>
  <h2>${it.name} · ${MLABELS[mi]}<button class="close" onclick="closeSheet()">✕</button></h2>
  <div class="flabel">투자원금 (누적)</div>
  <div class="frow"><input type="number" id="iiDep" value="${it.deps[mi]??''}"></div>
  <div class="flabel">현재 평가금</div>
  <div class="frow"><input type="number" id="iiVal" placeholder="입력전" value="${it.vals[mi]??''}"></div>
  <div class="flabel">배당금 — 보유수량 × 주당 배당금</div>
  <div class="frow">
    <input type="number" id="iiQty" placeholder="보유수량" value="${it.shares||''}">
    <input type="number" id="iiPer" placeholder="주당 배당금" value="${it.shares&&it.divs[mi]?Math.round(it.divs[mi]/it.shares):''}">
  </div>
  <div class="hl"><b>배당금 합계</b><span class="v" id="iiSum">${it.divs[mi]!=null?fmt(it.divs[mi])+'원':'0원'}</span></div>
  <button class="save-btn" style="margin-top:12px" onclick="saveItemInput(${ii})">저장</button>`;
  openSheetEl();
  const upd=()=>{$('#iiSum').textContent=fmt((+$('#iiQty').value||0)*(+$('#iiPer').value||0))+'원';};
  ['#iiQty','#iiPer'].forEach(s=>$(s).addEventListener('input',upd));
}
function saveItemInput(ii){
  const it=ISA_ITEMS[ii], mi=investMonthIdx;
  const dep=$('#iiDep').value, val=$('#iiVal').value, qty=+$('#iiQty').value||0, per=+$('#iiPer').value||0;
  if(dep!=='')for(let i=mi;i<it.deps.length;i++)it.deps[i]=+dep;
  if(val!=='')it.vals[mi]=+val;
  if(qty&&per){it.shares=qty;it.divs[mi]=qty*per;}
  else if(qty)it.shares=qty;
  closeSheet();toast('저장되었습니다');render();
}

const YEARLY_WORKS={
 '2023':{'안녕여음':4100000,'기억의잔상':3200000,'페오크':1500000,'장마끝':600000,'달토끼':400000},
 '2024':{'안녕여음':5900000,'기억의잔상':4000000,'골든아처스':2800000,'페오크':2100000,'장마끝':1000000,'윈터스파클':400000,'달토끼':200000},
 '2025':{'안녕여음':6300000,'기억의잔상':5200000,'골든아처스':4500000,'페오크':3200000,'장마끝':1900000,'윈터스파클':1300000,'달토끼':188432},
};
function yearWorks(y){
  if(y!=='2026')return YEARLY_WORKS[y];
  const m={};
  WORKS.forEach(w=>{const s=MLABELS.reduce((a,_,i)=>a+workDeposit(w,i),0);if(s>0)m[w.title]=s;});
  const etc=OTHER_ROYALTY.reduce((a,v)=>a+v,0);if(etc>0)m['기타']=etc;
  return m;
}
function setRyear(y){royaltyYear=y;render();}

function viewRoyaltyStats(){
  const trend=trendData();
  const thisYear=trend.reduce((s,x)=>s+x.v,0);
  const cum=WORKS.reduce((s,w)=>s+workCum(w),0);
  /* 올해 연평균: 1월부터 정산금이 입력된 마지막 월까지의 월평균 */
  let lastIdx=-1; MLABELS.forEach((_,i)=>{if(monthSettle(i)>0)lastIdx=i;});
  const avgMonthly=lastIdx>=0?thisYear/(lastIdx+1):0;
  const YEARS=[['2023',9800000],['2024',16400000],['2025',22588432],['2026',thisYear]];
  const maxY=Math.max(...YEARS.map(x=>x[1]));
  const yw=yearWorks(royaltyYear);
  const ywTotal=Object.values(yw).reduce((s,v)=>s+v,0)||1;
  const ywSorted=Object.entries(yw).sort((a,b)=>b[1]-a[1]);
  return `
  <div class="card hero">
    <div class="hstats">
      <div class="hs"><span>전체 누적</span><b>${fmt(cum)}원</b></div>
      <div class="hs"><span>올해 누적</span><b>${fmt(thisYear)}원</b></div>
      <div class="hs"><span>올해 연평균 (1~${lastIdx+1}월)</span><b>${fmt(avgMonthly)}원</b></div>
    </div>
  </div>
  <div class="card"><h3>연도별 인세</h3>
    <div class="chart" style="height:120px">
      ${YEARS.map(([y,v])=>`<div class="col" onclick="setRyear('${y}')">
        <span class="cv" style="color:${y===royaltyYear?'var(--accent-deep)':'var(--sub)'}">${kfmt(v)}</span>
        <i style="height:${Math.max(5,v/maxY*100)}%;background:${y===royaltyYear?'var(--accent)':'#cfdcd4'}"></i>
        <span style="${y===royaltyYear?'color:var(--accent-deep);font-weight:800':''}">${y}</span>
      </div>`).join('')}
    </div>
  </div>
  <div class="card"><h3>${royaltyYear}년 작품별 비중</h3>
    ${ywSorted.map(([t,v])=>{const p=v/ywTotal*100;
    return `<div class="acct" style="padding:9px 0">
      <div class="top" style="font-size:13px"><b style="font-size:13px">${t}</b><span><b>${fmt(v)}원</b> <span class="sub">${p.toFixed(1)}%</span></span></div>
      <div class="minibar" style="margin-top:5px"><i style="width:${p}%"></i></div>
    </div>`;}).join('')}
  </div>`;
}

  ${editId?`<button class="save-btn ghost" onclick="delTxn()">삭제</button>`:''}`;
  openSheetEl();
}
function saveManual(){
  const prev=editId?TXNS.find(x=>x.id===editId):null;
  const row={date:$('#mDate').value,amount:+$('#mAmt').value,desc:$('#mDesc').value||'(적요 없음)',category:$('#mCat').value,welfare:prev?prev.welfare:'',memo:$('#mMemo').value};
  if(!row.amount){toast('금액을 입력하세요');return;}
  if(editId){Object.assign(TXNS.find(x=>x.id===editId),row);toast('수정되었습니다');}
  else{TXNS.push({id:Date.now(),...row});toast('등록되었습니다');}
  closeSheet();render();
}
function delTxn(){TXNS=TXNS.filter(t=>t.id!==editId);toast('삭제되었습니다');closeSheet();render();}

/* 스냅샷 일괄 입력 — 계좌별 평가금 (ISA 항목은 개별 관리) */
function openInvestInput(){
  const mi=investMonthIdx;
  $('#sheet').innerHTML=`
  <div class="grab"></div>
  <h2>${MLABELS[mi]} 일괄 입력<button class="close" onclick="closeSheet()">✕</button></h2>
  ${ACCOUNTS.map((a,i)=>`<div class="batchrow"><span class="bn">${a.name}</span><input type="number" data-a="${i}" placeholder="입력전" value="${a.vals[mi]??''}"></div>`).join('')}
  <button class="save-btn" style="margin-top:14px" onclick="saveInvestInput()">저장</button>
  <div class="note" style="padding:8px 0 0">ISA 하위 항목은 계좌 카드에서 개별 입력</div>`;
  openSheetEl();
}
function saveInvestInput(){
  const mi=investMonthIdx;
  document.querySelectorAll('.batchrow input').forEach(inp=>{
    if(inp.value==='')return;
    ACCOUNTS[+inp.dataset.a].vals[mi]=+inp.value||0;
  });
  closeSheet();toast('저장되었습니다');render();
}

/* 인세 정산 입력 — 개별 입력 후 저장, 나중에 이어서 입력 가능. 세전 선택 시 ×96.7% 환산 */
function openRoyaltyInput(){
  const mi=MLABELS.length-1; /* 이번 달 */
  const sorted=[...WORKS].sort((a,b)=>STATUS_ORDER[workStatus(a)]-STATUS_ORDER[workStatus(b)]);
  $('#sheet').innerHTML=`
  <div class="grab"></div>
  <h2>7월 정산 입력<button class="close" onclick="closeSheet()">✕</button></h2>
  ${sorted.map(w=>{const i=WORKS.indexOf(w),st=workStatus(w);
  return `<div class="batchrow">
    <span class="bn">${w.title} <span class="tag ${st==='판매중'?'gg':st==='판매종료'?'rr':''}">${st}</span></span>
    <select class="mini" data-i="${i}"><option value="net">세후</option><option value="gross">세전</option></select>
    <input type="number" placeholder="0" data-i="${i}" value="${w.hist[mi]||''}">
    <span class="net" id="net${i}"></span>
  </div>`;}).join('')}
  <div class="batchrow">
    <span class="bn">기타 <span class="tag">작품 외</span></span>
    <select class="mini" data-i="etc"><option value="net">세후</option><option value="gross">세전</option></select>
    <input type="number" placeholder="0" data-i="etc" value="${OTHER_ROYALTY[mi]||''}">
    <span class="net" id="netetc"></span>
  </div>
  <div class="hl" style="margin-top:12px"><b>합계</b><span class="v" id="rSum">0원</span></div>
  <button class="save-btn" style="margin-top:12px" onclick="saveRoyaltyInput()">저장</button>
  <div class="note" style="padding:8px 0 0">입력한 항목만 저장돼요 · 나중에 다시 열어 이어서 입력 가능</div>`;
  openSheetEl();
  const upd=()=>{
    let s=0;
    document.querySelectorAll('.batchrow input').forEach(inp=>{
      const i=inp.dataset.i, mode=document.querySelector(`select.mini[data-i="${i}"]`).value;
      const v=+inp.value||0, net=mode==='gross'?Math.round(v*0.967):v;
      s+=net;
      const lbl=$('#net'+i);
      if(lbl)lbl.textContent=(mode==='gross'&&v)?('→ '+fmt(net)):'';
    });
    $('#rSum').textContent=fmt(s)+'원';
  };
  document.querySelectorAll('.batchrow input, .batchrow select.mini').forEach(el=>{el.addEventListener('input',upd);el.addEventListener('change',upd);});
  upd();
}
function saveRoyaltyInput(){
  const mi=MLABELS.length-1;
  document.querySelectorAll('.batchrow input').forEach(inp=>{
    if(inp.value==='')return; /* 빈 칸은 건드리지 않음 */
    const i=inp.dataset.i, mode=document.querySelector(`select.mini[data-i="${i}"]`).value;
    const net=mode==='gross'?Math.round((+inp.value||0)*0.967):(+inp.value||0);
    if(i==='etc')OTHER_ROYALTY[mi]=net; else WORKS[+i].hist[mi]=net;
  });
  closeSheet();toast('저장되었습니다 · 이어서 입력 가능');render();
}

/* 작품 등록/수정 */
let editWork=null;
function openWorkEdit(title){
  editWork=title||null;
  const w=editWork?WORKS.find(x=>x.title===editWork):null;
  $('#sheet').innerHTML=`
  <div class="grab"></div>
  <h2>${editWork?'작품 정보 수정':'작품 등록'}<button class="close" onclick="closeSheet()">✕</button></h2>
  <div class="flabel">작품명</div>
  <div class="frow"><input type="text" id="wTitle" placeholder="작품명" value="${w?w.title:''}"></div>
  <div class="flabel">출판사</div>
  <div class="frow"><input type="text" id="wPub" placeholder="출판사" value="${w?w.publisher:''}"></div>
  <div class="flabel">출간일 · 정산일</div>
  <div class="frow">
    <input type="text" id="wDate" placeholder="출간일 (예: 2026-01-10)" value="${w?w.pubDate:''}">
    <input type="text" id="wDay" placeholder="정산일 (예: 매월 15일)" value="${w?w.settleDay:''}">
  </div>
  <div class="flabel">선인세 (없으면 0) · 상태</div>
  <div class="frow">
    <input type="number" id="wAdv" placeholder="0" value="${w?w.advance:''}">
    <select id="wEnd">
      <option value="">자동 (출간일 기준)</option>
      <option value="1" ${w&&w.ended?'selected':''}>판매종료</option>
    </select>
  </div>
  <button class="save-btn" onclick="saveWork()">${editWork?'수정 저장':'등록'}</button>
  <div class="note" style="padding:8px 0 0">출간일이 지나면 자동으로 '출간전 → 판매중' 전환</div>`;
  openSheetEl();
}
function saveWork(){
  const data={title:$('#wTitle').value,publisher:$('#wPub').value,pubDate:$('#wDate').value,settleDay:$('#wDay').value,advance:+$('#wAdv').value||0,ended:$('#wEnd').value==='1'};
  if(!data.title){toast('작품명을 입력하세요');return;}
  if(editWork){Object.assign(WORKS.find(x=>x.title===editWork),data);if(royaltyWork===editWork)royaltyWork=data.title;toast('수정되었습니다');}
  else{WORKS.push({...data,hist:MLABELS.map(()=>0),base:data.advance});toast('작품이 등록되었습니다');}
  closeSheet();render();
}

/* ============ 설정 ============ */
function viewSettings(){
  const rows=[
    ['카테고리 · 예산','16개 / 총 130만원'],['저축·투자 계좌','10개'],['인세 작품',`${WORKS.length}개`],

  ];

  <div class="check ${typeof CFG!=='undefined'&&CFG?'done':'todo'}" onclick="openConfigEdit()"><div class="st">${typeof CFG!=='undefined'&&CFG?'✓':'·'}</div><div class="tx">구글 시트 연결</div><span class="hint">${typeof CFG!=='undefined'&&CFG?'연결됨':'미연결'} ›</span></div>
  </div>
  <div class="note">가계부 v0.14 · 실데이터 · config.js 설정 시 구글 시트 동기화</div>`;

render();

/* ============ 구글 시트 동기화 (config.js 있으면 활성화) ============ */
/* 연결 설정: config.js 또는 앱 내 설정(localStorage) */
const CFG=window.APP_CONFIG||(function(){try{const c=JSON.parse(localStorage.getItem('appConfig'));return(c&&c.url)?c:null;}catch(e){return null;}})();
function openConfigEdit(){
  const c=CFG||{url:'',token:''};
  $('#sheet').innerHTML=`
  <div class="grab"></div>
  <h2>구글 시트 연결<button class="close" onclick="closeSheet()">✕</button></h2>
  <div class="flabel">Apps Script 웹 앱 URL</div>
  <div class="frow"><input type="text" id="cfgUrl" placeholder="https://script.google.com/macros/s/.../exec" value="${c.url}"></div>
  <div class="flabel">토큰 (Code.gs의 TOKEN과 동일)</div>
  <div class="frow"><input type="text" id="cfgToken" placeholder="토큰" value="${c.token}"></div>
  <button class="save-btn" onclick="localStorage.setItem('appConfig',JSON.stringify({url:$('#cfgUrl').value.trim(),token:$('#cfgToken').value.trim()}));location.reload()">저장 후 연결</button>
  ${CFG?'<button class="save-btn ghost" onclick="localStorage.removeItem(\'appConfig\');location.reload()">연결 해제</button>':''}
  <div class="note">이 기기 브라우저에만 저장됩니다 (localStorage)</div>`;
  openSheetEl();
}
const SYNC_COLS={
  transactions:{get:()=>TXNS,set:v=>TXNS=v},
  works:{get:()=>WORKS,set:v=>WORKS=v},
  accounts:{get:()=>ACCOUNTS,set:v=>ACCOUNTS=v},
  isa_items:{get:()=>ISA_ITEMS,set:v=>ISA_ITEMS=v},
  savings:{get:()=>SAVINGS,set:v=>SAVINGS=v},
  fixed:{get:()=>FIXED,set:v=>FIXED=v},
  ry_month:{get:()=>RY_MONTH,set:v=>RY_MONTH=v},
};
let syncTimer=null,syncing=false;
function scheduleSync(){
  if(!CFG)return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(syncAll,1500); /* 변경 후 1.5초 뒤 일괄 저장 */
}
async function syncAll(){
  if(!CFG||syncing)return; syncing=true;
  try{
    const payload={token:CFG.token,action:'saveAll',data:{}};
    Object.entries(SYNC_COLS).forEach(([k,c])=>payload.data[k]=c.get());
    await fetch(CFG.url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
  }catch(e){toast('동기화 실패 — 네트워크 확인');}
  syncing=false;
}
async function bootFromSheet(){
  if(!CFG)return;
  try{
    const res=await fetch(`${CFG.url}?action=bootstrap&token=${encodeURIComponent(CFG.token)}`);
    const data=await res.json();
    let loaded=0;
    Object.entries(SYNC_COLS).forEach(([k,c])=>{
      if(Array.isArray(data[k])&&data[k].length){c.set(data[k]);loaded++;}
    });
    if(loaded===0){syncAll();toast('시트가 비어 있어 초기 데이터를 업로드했습니다');}
    else toast('구글 시트에서 불러왔습니다');
    render();
  }catch(e){toast('시트 연결 실패 — 내장 데이터로 표시');}
}
/* 모든 사용자 액션(토스트 발생)에 저장 예약을 연결 */
const _origToast=toast;
toast=function(m){_origToast(m);if(m&&!m.includes('동기화')&&!m.includes('불러왔')&&!m.includes('연결 실패'))scheduleSync();};
bootFromSheet();

/* 좌우 스와이프 감지 (월 이동) */
(function(){
  const el=$('#main'); if(!el||!el.addEventListener)return;
  let x0=0,y0=0;
  el.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;y0=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
    if(Math.abs(dx)<60||Math.abs(dy)>50)return;
    swipeMonth(dx<0?1:-1); /* 왼쪽 스와이프 = 다음 달 */
  },{passive:true});
})();
</script>
